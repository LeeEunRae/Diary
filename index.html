<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>루틴 다이어리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root{--bg:#fff;--surface:#f7f7f5;--surface2:#efefed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.18);--text:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;--accent:#378ADD;--green:#1D9E75;--red:#E24B4A;--radius:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--surface:#252523;--surface2:#2e2e2b;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.18);--text:#f0ede8;--text-secondary:#b4b2a9;--text-muted:#888780;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.view{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;}
.view.active{display:flex;}

/* 동기화 */
.sync-banner{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;font-size:11px;background:var(--surface);color:var(--text-muted);flex-shrink:0;cursor:pointer;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);}
.sync-dot.ok{background:var(--green);}
.sync-dot.syncing{background:#F5A623;animation:blink .8s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* 공통 UI */
.hd{display:flex;align-items:center;gap:6px;padding:.875rem 1rem .75rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.hd-title{font-size:15px;font-weight:500;flex:1;}
.ib{width:28px;height:28px;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px;flex-shrink:0;}
.ib:hover{background:var(--surface);}
.nb{width:28px;height:28px;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:14px;}
.nb:hover{background:var(--surface);}
.primary-btn{width:100%;padding:10px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px;}
.primary-btn:hover{opacity:.85;}
.icon-txt-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;color:var(--text-secondary);font-size:12px;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.icon-txt-btn:hover{background:var(--surface);}
.icon-txt-btn.active{background:var(--surface2);border-color:var(--border-strong);color:var(--text);}

/* 탭바 */
.tab-bar{display:flex;border-top:.5px solid var(--border);background:var(--bg);flex-shrink:0;}
.tab-btn{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-size:10px;font-family:inherit;}
.tab-btn i{font-size:20px;}
.tab-btn.active{color:var(--accent);}

/* 캘린더 */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem .75rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.cal-title{font-size:18px;font-weight:500;}
.cal-nav{display:flex;align-items:center;gap:5px;}
.cal-legend{font-size:11px;color:var(--text-muted);}
.cal-goal-btn{display:flex;align-items:center;gap:4px;padding:4px 7px;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:inherit;white-space:nowrap;}
.cal-goal-btn:hover{background:var(--surface);}
.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);padding:.4rem .25rem 0;flex-shrink:0;}
.wd{text-align:center;font-size:11px;color:var(--text-muted);padding:4px 0;font-weight:500;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:.2rem .25rem 1rem;gap:2px;}
.cal-day{border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;cursor:pointer;min-height:72px;gap:2px;transition:background .15s;padding:5px 1px;}
.cal-day:hover:not(.empty){background:var(--surface);}
.cal-day.empty{cursor:default;}
.cal-day.today .dn{width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--bg);display:flex;align-items:center;justify-content:center;}
.dn{font-size:12px;line-height:1;flex-shrink:0;}
.cal-day.empty .dn{color:var(--text-muted);}
.day-memo-text{font-size:8px;color:var(--text-secondary);line-height:1.3;text-align:center;width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-all;padding:0 1px;margin-top:1px;}
.day-done-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:3px;}

/* 데일리 루틴 */
.prog-wrap{padding:.65rem 1rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:5px;}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.r-item{border-bottom:.5px solid var(--border);}
.r-item-top{display:flex;align-items:center;gap:10px;padding:10px 1rem;}
.r-item.sort-mode{background:var(--surface);}
.sort-handle{width:28px;display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.sort-up,.sort-down{width:24px;height:20px;border-radius:4px;border:.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;padding:0;}
.sort-up:hover:not(:disabled),.sort-down:hover:not(:disabled){background:var(--surface2);}
.sort-up:disabled,.sort-down:disabled{opacity:.2;cursor:default;}
.r-icon{font-size:17px;width:26px;text-align:center;flex-shrink:0;cursor:pointer;}
.r-name{flex:1;font-size:14px;cursor:pointer;}
.r-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.memo-btn{width:24px;height:24px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-muted);}
.memo-btn.has-memo{color:var(--green);}
.del-r-btn{width:24px;height:24px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;}
.del-r-btn:hover{color:var(--red);}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer;}
.check-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
.r-memo-display{padding:0 1rem 8px 52px;font-size:13px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;word-break:break-all;}
.r-memo-edit{display:none;padding:0 1rem 10px 52px;}
.r-memo-edit.open{display:block;}
.r-memo-ta{width:100%;border:.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;line-height:1.5;padding:7px 10px;resize:none;min-height:60px;}
.r-memo-ta:focus{outline:none;border-color:var(--green);}
.r-memo-ta::placeholder{color:var(--text-muted);}
.memo-save-row{display:flex;justify-content:flex-end;gap:6px;margin-top:5px;}
.memo-cancel-btn{padding:4px 10px;font-size:12px;border:.5px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit;}
.memo-ok-btn{padding:4px 10px;font-size:12px;border:none;border-radius:var(--radius);background:var(--green);color:#fff;cursor:pointer;font-family:inherit;}
.add-routine-bar{display:flex;align-items:center;gap:8px;padding:10px 1rem;border-bottom:.5px solid var(--border);}
.preset-scroll{display:flex;gap:6px;flex:1;overflow-x:auto;padding-bottom:2px;}
.preset-scroll::-webkit-scrollbar{display:none;}
.preset-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border:.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;background:var(--surface);flex-shrink:0;}
.preset-chip:hover{border-color:var(--green);color:var(--green);}
.custom-add-btn{width:28px;height:28px;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px;flex-shrink:0;}
.custom-input-row{display:none;align-items:center;gap:6px;padding:8px 1rem;border-bottom:.5px solid var(--border);background:var(--surface);}
.custom-input-row.open{display:flex;}
.ci-icon-input{width:40px;height:32px;border-radius:var(--radius);border:.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:17px;text-align:center;padding:0;flex-shrink:0;}
.ci-name{flex:1;border:.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;padding:5px 9px;height:32px;}
.ci-name:focus,.ci-icon-input:focus{outline:none;border-color:var(--green);}
.ci-ok{width:32px;height:32px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.g-section{padding:1rem;border-top:.5px solid var(--border);}
.g-label{font-size:12px;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.g-textarea{width:100%;border:.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:15px;line-height:1.7;padding:12px 14px;resize:vertical;min-height:160px;}
.g-textarea:focus{outline:none;border-color:var(--green);}
.g-textarea::placeholder{color:var(--text-muted);}

/* 기본 루틴 편집 */
.edit-scroll{flex:1;overflow-y:auto;min-height:0;}
.edit-row{display:flex;align-items:center;gap:8px;padding:7px 1rem;border-bottom:.5px solid var(--border);flex-wrap:wrap;row-gap:4px;}
.order-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.ob{width:24px;height:22px;border-radius:4px;border:.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;padding:0;}
.ob:hover:not(:disabled){background:var(--surface);}
.ob:disabled{opacity:.25;cursor:default;}
.e-icon-input{width:38px;height:34px;border-radius:var(--radius);border:.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:17px;text-align:center;padding:0;flex-shrink:0;}
.e-icon-input:focus{outline:none;border-color:var(--green);}
.e-name-input{flex:1;border:.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;padding:6px 10px;height:34px;}
.e-name-input:focus{outline:none;border-color:var(--green);}
.one-badge{font-size:9px;background:#E1F5EE;color:#0F6E56;border-radius:4px;padding:2px 5px;flex-shrink:0;white-space:nowrap;}
.del-btn{width:26px;height:26px;border-radius:var(--radius);border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.del-btn:hover{color:var(--red);}
.add-row-btn{display:flex;align-items:center;gap:8px;padding:11px 1rem;color:var(--accent);font-size:14px;cursor:pointer;border:none;background:transparent;width:100%;font-family:inherit;}
.add-row-btn:hover{background:var(--surface);}
.edit-footer{padding:1rem;flex-shrink:0;border-top:.5px solid var(--border);}

/* 통계 */
.stats-hd{display:flex;align-items:center;gap:6px;padding:.875rem 1rem .75rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.stats-hd-title{font-size:15px;font-weight:500;flex:1;}
.stats-scope-row{display:flex;gap:6px;padding:10px 1rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.stats-scope-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:inherit;}
.stats-scope-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.stats-nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 1rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.stats-period-label{font-size:14px;font-weight:500;}
.stats-scroll{flex:1;overflow-y:auto;min-height:0;padding-bottom:1rem;}
.stats-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:1rem;}
.sc{background:var(--surface);border-radius:var(--radius);padding:12px;}
.sl{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.sv{font-size:22px;font-weight:500;}
.ss{font-size:11px;color:var(--text-secondary);margin-top:2px;}
.rst-section-title{font-size:12px;color:var(--text-muted);padding:8px 1rem 4px;font-weight:500;}
.rst-row{display:flex;align-items:center;gap:10px;padding:8px 1rem;border-bottom:.5px solid var(--border);}
.ri{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.rn{flex:1;font-size:13px;}
.rb-w{width:70px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.rb{height:100%;background:var(--green);border-radius:2px;}
.rp{font-size:12px;color:var(--text-secondary);min-width:30px;text-align:right;}
.month-bars{padding:0 1rem .5rem;}
.mb-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);}
.mb-label{font-size:12px;color:var(--text-secondary);width:28px;flex-shrink:0;}
.mb-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.mb-bar{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.mb-pct{font-size:11px;color:var(--text-secondary);min-width:40px;text-align:right;}
.count-stat-row{display:flex;align-items:center;gap:10px;padding:8px 1rem;border-bottom:.5px solid var(--border);}
.csr-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.csr-name{flex:1;font-size:13px;}
.csr-val{font-size:13px;font-weight:500;min-width:50px;text-align:right;}
.csr-target{font-size:11px;color:var(--text-muted);font-weight:400;}

/* 성장 탭 */
.grow-tab-row{display:flex;border-bottom:.5px solid var(--border);flex-shrink:0;overflow-x:auto;}
.grow-tab-row::-webkit-scrollbar{display:none;}
.grow-tab{flex:1;min-width:64px;padding:10px 0;text-align:center;font-size:12px;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;}
.grow-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500;}
.grow-scroll{flex:1;overflow-y:auto;min-height:0;padding-bottom:1rem;}
.grow-section{padding:1rem;}
.grow-section-title{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.grow-card{background:var(--surface);border-radius:var(--radius);padding:1rem;margin-bottom:10px;}
.grow-card-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.grow-input{width:100%;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;padding:8px 12px;height:38px;margin-bottom:10px;}
.grow-input:focus{outline:none;border-color:var(--green);}
.grow-textarea{width:100%;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;line-height:1.6;padding:10px 12px;resize:vertical;min-height:80px;margin-bottom:10px;}
.grow-textarea:focus{outline:none;border-color:var(--green);}
.grow-textarea::placeholder,.grow-input::placeholder{color:var(--text-muted);}
.grow-save-btn{padding:8px 20px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.grow-save-btn:hover{opacity:.85;}
.week-nav-row,.review-nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 1rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.week-label,.review-label{font-size:13px;font-weight:500;}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border);}
.goal-item:last-child{border-bottom:none;}
.goal-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .15s;}
.goal-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.goal-text{flex:1;font-size:14px;line-height:1.5;}
.goal-text.done-text{color:var(--text-muted);text-decoration:line-through;}
.goal-del{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.goal-del:hover{color:var(--red);}
.goal-add-row{display:flex;gap:8px;margin-top:8px;}
.goal-add-input{flex:1;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;padding:7px 10px;height:36px;}
.goal-add-input:focus{outline:none;border-color:var(--green);}
.goal-add-btn{width:36px;height:36px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.goal-prog-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.goal-prog-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.goal-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.goal-prog-label{font-size:11px;color:var(--text-muted);min-width:28px;text-align:right;}
/* 임장 결론 버튼 */
.verdict-row{display:flex;gap:8px;margin-bottom:4px;}
.vbtn{flex:1;padding:8px;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;}

/* 설정 */
.setting-scroll{flex:1;overflow-y:auto;min-height:0;}
.setting-menu-btn{display:flex;align-items:center;gap:12px;padding:14px 1rem;background:var(--surface);border-radius:var(--radius);border:.5px solid var(--border);cursor:pointer;font-family:inherit;text-align:left;width:100%;margin-bottom:8px;}
.setting-menu-btn:hover{background:var(--surface2);}

/* 월목표 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg);border-radius:12px;width:320px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;}
.modal-hd{display:flex;align-items:center;gap:8px;padding:1rem 1rem .75rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.modal-title{font-size:15px;font-weight:500;flex:1;}
.modal-scroll{flex:1;overflow-y:auto;padding:.5rem 0;}
.mgoal-row{display:flex;align-items:center;gap:10px;padding:10px 1rem;border-bottom:.5px solid var(--border);}
.mgoal-icon{font-size:18px;flex-shrink:0;}
.mgoal-name{flex:1;font-size:14px;}
.mgoal-input{width:60px;height:34px;border-radius:var(--radius);border:.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;text-align:center;padding:0;flex-shrink:0;}
.mgoal-input:focus{outline:none;border-color:var(--green);}
.mgoal-unit{font-size:12px;color:var(--text-muted);flex-shrink:0;}
.modal-footer{padding:1rem;border-top:.5px solid var(--border);}

/* PDF */
.pdf-modal-title{font-size:15px;font-weight:500;}
.pdf-modal-sub{font-size:12px;color:var(--text-muted);}
.pdf-scope-row{display:flex;gap:8px;}
.scope-btn{flex:1;padding:8px 0;border-radius:var(--radius);border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;}
.scope-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.pdf-preview-wrap{border:.5px solid var(--border);border-radius:var(--radius);padding:12px;overflow-y:auto;max-height:200px;background:var(--surface);}
.pdf-day-count{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.pdf-day-chip{display:inline-flex;margin:2px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--surface2);border:.5px solid var(--border);color:var(--text-secondary);}
.pdf-day-chip.has-done{border-color:var(--green);color:var(--green);}
.pdf-modal-actions{display:flex;gap:8px;}
.pdf-cancel-btn{flex:1;padding:9px;border:.5px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;}
.pdf-go-btn{flex:2;padding:9px;border:none;border-radius:var(--radius);background:var(--text);color:var(--bg);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.pdf-go-btn:disabled{opacity:.4;cursor:default;}

/* 프린트 */
#print-area{position:fixed;left:-99999px;top:0;width:0;height:0;overflow:hidden;}
@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:static;left:0;width:auto;height:auto;overflow:visible;}
  .p-day-page{padding:28px 32px;page-break-after:always;}
  .p-day-page:last-child{page-break-after:auto;}
  .p-header{border-bottom:2px solid #1a1a18;padding-bottom:10px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;}
  .p-date{font-size:20px;font-weight:600;color:#1a1a18;}
  .p-prog{font-size:12px;color:#555;}
  .p-section-title{font-size:10px;font-weight:600;color:#999;letter-spacing:.08em;margin:14px 0 6px;}
  .p-routine{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #eee;}
  .p-check{width:16px;height:16px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;margin-top:2px;}
  .p-check.done{background:#1D9E75;border-color:#1D9E75;}
  .p-check.done::after{content:'✓';color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
  .p-r-icon{font-size:14px;flex-shrink:0;}
  .p-r-body{flex:1;}
  .p-r-name{font-size:13px;color:#1a1a18;}
  .p-r-memo{font-size:11px;color:#666;margin-top:2px;white-space:pre-wrap;}
  .p-gratitude{background:#f9f9f7;border-radius:6px;padding:10px;font-size:12px;line-height:1.6;color:#333;white-space:pre-wrap;margin-top:4px;}
  .p-footer{margin-top:16px;font-size:10px;color:#ccc;text-align:right;}
}
</style>
</head>
<body>
<div class="app">

<!-- 캘린더 -->
<div id="view-cal" class="view active" style="flex-direction:column;min-height:0;">
  <div class="sync-banner" id="sync-banner" onclick="manualRefresh()" style="flex-shrink:0;">
    <div class="sync-dot" id="sync-dot"></div><span id="sync-text">연결 중…</span>
    <i class="ti ti-refresh" style="font-size:13px;margin-left:2px;opacity:.6;"></i>
  </div>
  <div class="cal-header" style="flex-shrink:0;">
    <span class="cal-title" id="cal-title"></span>
    <div class="cal-nav">
      <span class="cal-legend" id="cal-legend"></span>
      <button class="cal-goal-btn" onclick="openMGoalModal()"><i class="ti ti-target" style="font-size:13px"></i>월목표</button>
      <button class="nb" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <button class="nb" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="weekday-row" style="flex-shrink:0;">
    <div class="wd" style="color:var(--red)">일</div><div class="wd">월</div><div class="wd">화</div>
    <div class="wd">수</div><div class="wd">목</div><div class="wd">금</div><div class="wd" style="color:var(--red)">토</div>
  </div>
  <div style="flex:1;overflow-y:auto;min-height:0;">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="tab-bar" style="flex-shrink:0;">
    <button class="tab-btn active" onclick="showView('cal')"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="tab-btn" onclick="showView('grow')"><i class="ti ti-plant"></i>성장</button>
    <button class="tab-btn" onclick="showView('stats')"><i class="ti ti-chart-bar"></i>통계</button>
    <button class="tab-btn" onclick="showView('setting')"><i class="ti ti-settings"></i>설정</button>
  </div>
</div>

<!-- 데일리 -->
<div id="view-daily" class="view" style="flex-direction:column;min-height:0;">
  <div class="hd" style="flex-shrink:0;">
    <button class="ib" onclick="showView('cal')"><i class="ti ti-arrow-left"></i></button>
    <span class="hd-title" id="daily-date-label"></span>
    <button class="icon-txt-btn" id="sort-toggle-btn" onclick="toggleSortMode()"><i class="ti ti-arrows-sort"></i>순서</button>
    <button class="icon-txt-btn" onclick="openPdfModal('day')"><i class="ti ti-file-type-pdf"></i>PDF</button>
  </div>
  <div class="prog-wrap" style="flex-shrink:0;">
    <div class="prog-label"><span id="prog-count">달성 0/0</span><span id="prog-pct" style="color:var(--green);font-weight:500">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div style="flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch;">
    <div id="routines-list"></div>
    <div class="add-routine-bar">
      <div class="preset-scroll" id="preset-scroll"></div>
      <button class="custom-add-btn" onclick="toggleCustomInput()"><i class="ti ti-plus"></i></button>
    </div>
    <div class="custom-input-row" id="custom-input-row">
      <input class="ci-icon-input" id="ci-icon-input" maxlength="2" placeholder="🙂"/>
      <input class="ci-name" id="ci-name" placeholder="루틴 이름 입력" onkeydown="if(event.key==='Enter')addCustomRoutine()"/>
      <button class="ci-ok" onclick="addCustomRoutine()"><i class="ti ti-check"></i></button>
    </div>
    <div class="g-section">
      <div class="g-label"><i class="ti ti-heart" style="font-size:14px;color:#D4537E"></i>감사일기</div>
      <textarea class="g-textarea" id="gratitude-text" placeholder="오늘 감사한 일을 자유롭게 적어보세요…" rows="6"></textarea>
      <button class="primary-btn" onclick="saveDay()">저장</button>
    </div>
    <div style="height:32px;"></div>
  </div>
</div>

<!-- 성장 -->
<div id="view-grow" class="view" style="flex-direction:column;min-height:0;">
  <div class="hd" style="flex-shrink:0;">
    <button class="ib" onclick="showView('cal')"><i class="ti ti-arrow-left"></i></button>
    <span class="hd-title">성장 관리</span>
  </div>
  <div class="grow-tab-row">
    <button class="grow-tab active" id="gtab-week" onclick="setGrowTab('week')">주간목표</button>
    <button class="grow-tab" id="gtab-qyear" onclick="setGrowTab('qyear')">분기·연간</button>
    <button class="grow-tab" id="gtab-review" onclick="setGrowTab('review')">월간회고</button>
    <button class="grow-tab" id="gtab-imsang" onclick="setGrowTab('imsang')">임장기록</button>
  </div>

  <!-- 주간 목표 -->
  <div id="gpanel-week" class="grow-scroll" style="display:flex;flex-direction:column;">
    <div class="week-nav-row">
      <button class="nb" onclick="weekPrev()"><i class="ti ti-chevron-left"></i></button>
      <span class="week-label" id="week-label"></span>
      <button class="nb" onclick="weekNext()"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="grow-section">
      <div class="grow-section-title">이번 주 핵심 목표</div>
      <div class="grow-card">
        <textarea class="grow-textarea" id="week-focus" placeholder="이번 주 딱 하나의 집중 목표를 적어요…" rows="3" style="margin-bottom:0;"></textarea>
      </div>
      <div class="grow-section-title">주간 체크리스트</div>
      <div class="grow-card">
        <div id="week-goal-list"></div>
        <div class="goal-add-row">
          <input class="goal-add-input" id="week-goal-input" placeholder="목표 추가…" onkeydown="if(event.key==='Enter')addWeekGoal()"/>
          <button class="goal-add-btn" onclick="addWeekGoal()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <button class="grow-save-btn" onclick="saveWeekGoal()">저장</button>
    </div>
  </div>

  <!-- 분기·연간 -->
  <div id="gpanel-qyear" class="grow-scroll" style="display:none;flex-direction:column;">
    <div class="grow-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="grow-section-title" style="margin-bottom:0;">연간 목표</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="nb" onclick="yearGoalPrev()"><i class="ti ti-chevron-left"></i></button>
          <span id="year-goal-label" style="font-size:13px;font-weight:500;min-width:50px;text-align:center;"></span>
          <button class="nb" onclick="yearGoalNext()"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="grow-card">
        <div id="year-goal-list"></div>
        <div class="goal-add-row">
          <input class="goal-add-input" id="year-goal-input" placeholder="연간 목표 추가…" onkeydown="if(event.key==='Enter')addYearGoal()"/>
          <button class="goal-add-btn" onclick="addYearGoal()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 10px;">
        <div class="grow-section-title" style="margin-bottom:0;">분기 목표</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="nb" onclick="quarterPrev()"><i class="ti ti-chevron-left"></i></button>
          <span id="quarter-label" style="font-size:13px;font-weight:500;min-width:70px;text-align:center;"></span>
          <button class="nb" onclick="quarterNext()"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="grow-card">
        <div id="quarter-goal-list"></div>
        <div class="goal-add-row">
          <input class="goal-add-input" id="quarter-goal-input" placeholder="분기 목표 추가…" onkeydown="if(event.key==='Enter')addQuarterGoal()"/>
          <button class="goal-add-btn" onclick="addQuarterGoal()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <button class="grow-save-btn" onclick="saveQYearGoals()">저장</button>
    </div>
  </div>

  <!-- 월간 회고 -->
  <div id="gpanel-review" class="grow-scroll" style="display:none;flex-direction:column;">
    <div class="review-nav-row">
      <button class="nb" onclick="reviewPrev()"><i class="ti ti-chevron-left"></i></button>
      <span class="review-label" id="review-label"></span>
      <button class="nb" onclick="reviewNext()"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="grow-section">
      <div class="grow-card"><div class="grow-card-label">✅ 이달 잘한 것</div><textarea class="grow-textarea" id="review-good" placeholder="이번 달 잘 해낸 것들…" rows="4"></textarea></div>
      <div class="grow-card"><div class="grow-card-label">💡 아쉬웠던 것</div><textarea class="grow-textarea" id="review-bad" placeholder="아쉬웠거나 개선하고 싶은 점…" rows="4"></textarea></div>
      <div class="grow-card"><div class="grow-card-label">🎯 다음 달 다짐</div><textarea class="grow-textarea" id="review-next" placeholder="다음 달에는 이렇게 해볼 거예요…" rows="4"></textarea></div>
      <button class="grow-save-btn" onclick="saveReview()">저장</button>
    </div>
  </div>

  <!-- 임장 기록 (월 단위) -->
  <div id="gpanel-imsang" class="grow-scroll" style="display:none;flex-direction:column;">
    <div class="review-nav-row">
      <button class="nb" onclick="imsangPrev()"><i class="ti ti-chevron-left"></i></button>
      <span class="review-label" id="imsang-label"></span>
      <button class="nb" onclick="imsangNext()"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="grow-section">
      <div class="grow-card">
        <div class="grow-card-label">📍 지역 / 단지명</div>
        <input class="grow-input" id="imsang-region" placeholder="예: 동작구 상도 래미안"/>
        <div class="grow-card-label">📅 방문일</div>
        <input class="grow-input" id="imsang-date" type="date"/>
        <div class="grow-card-label">💰 시세 / 갭</div>
        <textarea class="grow-textarea" id="imsang-price" placeholder="매매 OO억, 전세 OO억, 갭 OO억…" rows="2"></textarea>
        <div class="grow-card-label">🏠 단지 특징 / 입지</div>
        <textarea class="grow-textarea" id="imsang-feature" placeholder="역세권, 학군, 직주근접, 브랜드, 세대수…" rows="3"></textarea>
        <div class="grow-card-label">✍️ 세부 메모</div>
        <textarea class="grow-textarea" id="imsang-memo" placeholder="현장 분위기, 공인중개사 말, 느낀 점…" rows="4"></textarea>
        <div class="grow-card-label">🎯 결론</div>
        <div class="verdict-row">
          <button class="vbtn" id="vbtn-긍정" onclick="setImsangVerdict('긍정')">👍 긍정</button>
          <button class="vbtn" id="vbtn-보류" onclick="setImsangVerdict('보류')">🤔 보류</button>
          <button class="vbtn" id="vbtn-패스" onclick="setImsangVerdict('패스')">❌ 패스</button>
        </div>
      </div>
      <button class="grow-save-btn" onclick="saveImsang()">저장</button>
    </div>
  </div>

  <div class="tab-bar" style="flex-shrink:0;">
    <button class="tab-btn" onclick="showView('cal')"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="tab-btn active" onclick="showView('grow')"><i class="ti ti-plant"></i>성장</button>
    <button class="tab-btn" onclick="showView('stats')"><i class="ti ti-chart-bar"></i>통계</button>
    <button class="tab-btn" onclick="showView('setting')"><i class="ti ti-settings"></i>설정</button>
  </div>
</div>

<!-- 통계 -->
<div id="view-stats" class="view" style="flex-direction:column;min-height:0;">
  <div class="stats-hd">
    <button class="ib" onclick="showView('cal')"><i class="ti ti-arrow-left"></i></button>
    <span class="stats-hd-title">통계</span>
  </div>
  <div class="stats-scope-row">
    <button class="stats-scope-btn active" id="scope-btn-month" onclick="setStatsScope('month')">이번 달</button>
    <button class="stats-scope-btn" id="scope-btn-year" onclick="setStatsScope('year')">올해</button>
  </div>
  <div class="stats-nav-row">
    <button class="nb" onclick="statsPrev()"><i class="ti ti-chevron-left"></i></button>
    <span class="stats-period-label" id="stats-period-label"></span>
    <button class="nb" onclick="statsNext()"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="stats-scroll"><div id="stats-body"></div></div>
  <div class="tab-bar" style="flex-shrink:0;">
    <button class="tab-btn" onclick="showView('cal')"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="tab-btn" onclick="showView('grow')"><i class="ti ti-plant"></i>성장</button>
    <button class="tab-btn active" onclick="showView('stats')"><i class="ti ti-chart-bar"></i>통계</button>
    <button class="tab-btn" onclick="showView('setting')"><i class="ti ti-settings"></i>설정</button>
  </div>
</div>

<!-- 기본 루틴 편집 -->
<div id="view-edit" class="view" style="flex-direction:column;min-height:0;">
  <div class="hd" style="flex-shrink:0;">
    <button class="ib" onclick="showView('setting')"><i class="ti ti-arrow-left"></i></button>
    <span class="hd-title">기본 루틴 관리</span>
  </div>
  <div style="padding:8px 1rem 6px;font-size:12px;color:var(--text-muted);flex-shrink:0;">날짜를 열면 기본 루틴이 자동으로 추가돼요. 아이콘 칸을 눌러 이모지를 직접 입력하세요.</div>
  <div class="edit-scroll">
    <div id="edit-list"></div>
    <button class="add-row-btn" onclick="addDefaultRoutine()"><i class="ti ti-plus" style="font-size:16px"></i> 루틴 추가</button>
  </div>
  <div class="edit-footer">
    <button class="primary-btn" style="margin-top:0" onclick="saveDefaults()">저장하고 나가기</button>
  </div>
</div>

<!-- 설정 -->
<div id="view-setting" class="view" style="flex-direction:column;min-height:0;">
  <div class="hd" style="flex-shrink:0;">
    <button class="ib" onclick="showView('cal')"><i class="ti ti-arrow-left"></i></button>
    <span class="hd-title">설정</span>
  </div>
  <div class="setting-scroll" style="padding:1rem;">
    <div class="grow-section-title">루틴 관리</div>
    <button class="setting-menu-btn" onclick="showView('edit')">
      <i class="ti ti-list-check" style="font-size:20px;color:var(--accent)"></i>
      <div style="flex:1;text-align:left;"><div style="font-size:14px;font-weight:500;">기본 루틴 설정</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px;">루틴 추가·삭제·순서·카운트 설정</div></div>
      <i class="ti ti-chevron-right" style="color:var(--text-muted)"></i>
    </button>
    <button class="setting-menu-btn" onclick="openMGoalModal()">
      <i class="ti ti-target" style="font-size:20px;color:var(--green)"></i>
      <div style="flex:1;text-align:left;"><div style="font-size:14px;font-weight:500;">월별 카운트 목표</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px;">이번 달 루틴별 목표 횟수 설정</div></div>
      <i class="ti ti-chevron-right" style="color:var(--text-muted)"></i>
    </button>
    <button class="setting-menu-btn" onclick="openPdfModal('all')">
      <i class="ti ti-file-type-pdf" style="font-size:20px;color:var(--red)"></i>
      <div style="flex:1;text-align:left;"><div style="font-size:14px;font-weight:500;">전체 기록 PDF 저장</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px;">기록된 날짜를 PDF로 내보내기</div></div>
      <i class="ti ti-chevron-right" style="color:var(--text-muted)"></i>
    </button>
  </div>
  <div class="tab-bar" style="flex-shrink:0;">
    <button class="tab-btn" onclick="showView('cal')"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="tab-btn" onclick="showView('grow')"><i class="ti ti-plant"></i>성장</button>
    <button class="tab-btn" onclick="showView('stats')"><i class="ti ti-chart-bar"></i>통계</button>
    <button class="tab-btn active" onclick="showView('setting')"><i class="ti ti-settings"></i>설정</button>
  </div>
</div>

</div><!-- .app -->

<!-- 월목표 모달 -->
<div id="mgoal-overlay" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-hd">
      <button class="ib" onclick="closeMGoalModal()"><i class="ti ti-x"></i></button>
      <span class="modal-title" id="mgoal-title">이달 카운트 목표</span>
    </div>
    <div class="modal-scroll" id="mgoal-list"></div>
    <div class="modal-footer"><button class="primary-btn" style="margin-top:0" onclick="saveMGoal()">저장</button></div>
  </div>
</div>

<!-- PDF 모달 -->
<div id="pdf-overlay" class="modal-overlay">
  <div class="modal-box" style="gap:12px;padding:1.5rem;display:flex;flex-direction:column;">
    <div class="pdf-modal-title" id="pdf-modal-title">PDF 저장</div>
    <div class="pdf-modal-sub" id="pdf-modal-sub"></div>
    <div class="pdf-scope-row" id="pdf-scope-row">
      <button class="scope-btn active" id="scope-month" onclick="setPdfScope('month')">이번 달</button>
      <button class="scope-btn" id="scope-all" onclick="setPdfScope('all')">전체 기록</button>
    </div>
    <div class="pdf-preview-wrap">
      <div class="pdf-day-count" id="pdf-day-count"></div>
      <div id="pdf-day-list"></div>
    </div>
    <div class="pdf-modal-actions">
      <button class="pdf-cancel-btn" onclick="closePdfModal()">취소</button>
      <button class="pdf-go-btn" id="pdf-go-btn" onclick="doPrint()"><i class="ti ti-download"></i>PDF 저장</button>
    </div>
  </div>
</div>

<div id="print-area"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,setDoc,getDoc,collection,getDocs}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const FC={apiKey:"AIzaSyBsKS_5mrxUzMK3CVopeTyKmNXFFT-nRkE",authDomain:"my-diary-e9446.firebaseapp.com",projectId:"my-diary-e9446",storageBucket:"my-diary-e9446.firebasestorage.app",messagingSenderId:"291228938130",appId:"1:291228938130:web:13bacb3a59d24e2804db4b"};
const app=initializeApp(FC);const db=getFirestore(app);
const WD=['일','월','화','수','목','금','토'];
const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DR=[{id:'goal',icon:'🏅',name:'목표, 실적, 감사일기'},{id:'exercise',icon:'🧘',name:'운동'},{id:'routine',icon:'💚',name:'루티니'},{id:'reading',icon:'📚',name:'독독'},{id:'market',icon:'📝',name:'시세'},{id:'report',icon:'🗂',name:'임보'}];
let state={},DR2=[],editTemp=[],monthGoals={},growData={};
let curYear,curMonth,curDay,openMemoIdx=-1,pdfScope='month',saveTimer=null,sortMode=false;
let statsScope='month',statsYear,statsMonth;
let growTab='week',curWeekMon,curYearGoal,curQuarter,reviewYear,reviewMonth,imsangYear,imsangMonth;
let curImsangVerdict='';

/* ── Firebase ── */
function ss(s){const d=document.getElementById('sync-dot'),t=document.getElementById('sync-text');d.className='sync-dot '+s;t.textContent={ok:'동기화됨',syncing:'저장 중…',err:'오프라인'}[s]||'';}
async function loadFB(){
  ss('syncing');
  try{
    const dd=await getDoc(doc(db,'diary','defaults'));
    DR2=dd.exists()?dd.data().routines:JSON.parse(JSON.stringify(DR));
    const ds=await getDocs(collection(db,'diary','days','entries'));state={};ds.forEach(d=>{state[d.id]=d.data();});
    const ms=await getDocs(collection(db,'diary','monthGoals','entries'));monthGoals={};ms.forEach(d=>{monthGoals[d.id]=d.data();});
    const gs=await getDocs(collection(db,'diary','grow','entries'));growData={};gs.forEach(d=>{growData[d.id]=d.data();});
    ss('ok');
  }catch(e){
    console.error('Firebase error:',e);
    try{state=JSON.parse(localStorage.getItem('dv5')||'{}');}catch(e2){state={};}
    try{const s=localStorage.getItem('ddef');DR2=s?JSON.parse(s):JSON.parse(JSON.stringify(DR));}catch(e2){DR2=JSON.parse(JSON.stringify(DR));}
    try{monthGoals=JSON.parse(localStorage.getItem('dmg')||'{}');}catch(e2){monthGoals={};}
    try{growData=JSON.parse(localStorage.getItem('dgrow')||'{}');}catch(e2){growData={};}
    ss('err');
  }
  renderCalendar();
}
async function saveDay2FB(k,d){ss('syncing');try{localStorage.setItem('dv5',JSON.stringify(state));}catch(e){}try{await setDoc(doc(db,'diary','days','entries',k),d);ss('ok');}catch(e){console.error(e);ss('err');}}
async function saveDef2FB(){ss('syncing');try{localStorage.setItem('ddef',JSON.stringify(DR2));}catch(e){}try{await setDoc(doc(db,'diary','defaults'),{routines:DR2});ss('ok');}catch(e){console.error(e);ss('err');}}
async function saveMG2FB(k,d){ss('syncing');try{localStorage.setItem('dmg',JSON.stringify(monthGoals));}catch(e){}try{await setDoc(doc(db,'diary','monthGoals','entries',k),d);ss('ok');}catch(e){console.error(e);ss('err');}}
async function saveGrow(k,d){growData[k]=d;ss('syncing');try{localStorage.setItem('dgrow',JSON.stringify(growData));}catch(e){}try{await setDoc(doc(db,'diary','grow','entries',k),d);ss('ok');}catch(e){console.error(e);ss('err');}}
function sched(k,d){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveDay2FB(k,d),800);}
async function manualRefresh(){const b=document.getElementById('sync-banner');b.style.pointerEvents='none';await loadFB();renderCalendar();b.style.pointerEvents='';}
window.manualRefresh=manualRefresh;

/* ── 공통 ── */
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function mgk(y,m){return`${y}-${String(m+1).padStart(2,'0')}`;}
function getMT(rid,y,m){const k=mgk(y,m);if(monthGoals[k]&&monthGoals[k][rid]!=null)return monthGoals[k][rid];const r=DR2.find(r=>r.id===rid);return r?(r.target||1):1;}
function getDay(y,m,d){
  const k=dk(y,m,d);
  if(!state[k]){state[k]={routines:DR2.map(r=>({...r,done:false,memo:'',countMode:r.countMode||false,count:0})),gratitude:''};}
  const cids=new Set(DR2.filter(r=>r.countMode).map(r=>r.id));
  state[k].routines.forEach(r=>{if(r.countMode||cids.has(r.id))r.target=getMT(r.id,y,m);});
  return state[k];
}
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const t=document.getElementById('view-'+v);if(t)t.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')===`showView('${v}')`));
  if(v==='cal'){sortMode=false;renderCalendar();}
  if(v==='stats')renderStats();
  if(v==='edit')renderEditView();
  if(v==='grow')renderGrowView();
}
window.showView=showView;
function changeMonth(d){curMonth+=d;if(curMonth<0){curYear--;curMonth=11;}if(curMonth>11){curYear++;curMonth=0;}renderCalendar();}
window.changeMonth=changeMonth;

/* ── 캘린더 ── */
function renderCalendar(){
  document.getElementById('cal-title').textContent=`${String(curYear).slice(2)}년 ${MO[curMonth]}`;
  const first=DR2[0];
  if(first)document.getElementById('cal-legend').textContent=first.name.length>6?first.name.slice(0,6)+'…':first.name;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const today=new Date();
  const sd=new Date(curYear,curMonth,1).getDay(); // 0=일
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<sd;i++){const el=document.createElement('div');el.className='cal-day empty';el.innerHTML='<span class="dn"></span>';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');el.className='cal-day';
    if(today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d)el.classList.add('today');
    const dd=state[dk(curYear,curMonth,d)];
    let inner='';
    if(dd&&dd.routines&&dd.routines.length>0){
      const fr=dd.routines[0];const memo=fr.memo&&fr.memo.trim()?fr.memo.trim():'';
      if(memo)inner+=`<span class="day-memo-text">${memo}</span>`;
      else if(fr.done||(fr.countMode&&(fr.count||0)>=1))inner+=`<span class="day-done-dot"></span>`;
    }
    el.innerHTML=`<span class="dn">${d}</span>${inner}`;
    el.onclick=()=>openDay(d);grid.appendChild(el);
  }
}

/* ── 데일리 ── */
function openDay(d){
  curDay=d;openMemoIdx=-1;sortMode=false;
  document.getElementById('sort-toggle-btn').classList.remove('active');
  const o=new Date(curYear,curMonth,d);
  document.getElementById('daily-date-label').textContent=`${String(curYear).slice(2)}년 ${curMonth+1}월 ${d}일 (${WD[o.getDay()]})`;
  document.getElementById('gratitude-text').value=getDay(curYear,curMonth,d).gratitude||'';
  closeCustomInput();renderDailyRoutines();renderPresets();showView('daily');
}
window.openDay=openDay;
function toggleSortMode(){sortMode=!sortMode;document.getElementById('sort-toggle-btn').classList.toggle('active',sortMode);openMemoIdx=-1;renderDailyRoutines();}
window.toggleSortMode=toggleSortMode;
function moveDR(i,dir){const dd=getDay(curYear,curMonth,curDay);const j=i+dir;if(j<0||j>=dd.routines.length)return;[dd.routines[i],dd.routines[j]]=[dd.routines[j],dd.routines[i]];sched(dk(curYear,curMonth,curDay),dd);renderDailyRoutines();}
window.moveDR=moveDR;
function renderDailyRoutines(){
  const dd=getDay(curYear,curMonth,curDay);
  const list=document.getElementById('routines-list');list.innerHTML='';
  const cids=new Set(DR2.filter(r=>r.countMode).map(r=>r.id));
  dd.routines.forEach((r,i)=>{
    const isCount=r.countMode||cids.has(r.id);
    const tgt=getMT(r.id,curYear,curMonth);
    const cnt=r.count||0;
    const checked=isCount?(cnt>=1):r.done;
    const wrap=document.createElement('div');wrap.className='r-item'+(sortMode?' sort-mode':'');
    const hasMemo=!!(r.memo&&r.memo.trim()),isOpen=(openMemoIdx===i&&!sortMode);
    const top=document.createElement('div');top.className='r-item-top';
    if(sortMode){
      top.innerHTML=`<div class="sort-handle"><button class="sort-up" onclick="moveDR(${i},-1)" ${i===0?'disabled':''}><i class="ti ti-chevron-up"></i></button><button class="sort-down" onclick="moveDR(${i},1)" ${i===dd.routines.length-1?'disabled':''}><i class="ti ti-chevron-down"></i></button></div><span class="r-icon" style="cursor:default">${r.icon}</span><span class="r-name" style="cursor:default;color:var(--text-secondary)">${r.name}</span><span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">${i+1}순위</span>`;
    } else {
      const cb=isCount?`<span style="font-size:11px;color:${cnt>=tgt?'var(--green)':'var(--text-muted)'};min-width:36px;text-align:right;flex-shrink:0;">${cnt}/${tgt}</span>`:'';
      top.innerHTML=`<span class="r-icon">${r.icon}</span><span class="r-name">${r.name}</span><div class="r-actions">${cb}<button class="memo-btn ${hasMemo||isOpen?'has-memo':''}"><i class="ti ti-pencil"></i></button><button class="del-r-btn"><i class="ti ti-x"></i></button><div class="check-circle ${checked?'done':''}">${checked?'<i class="ti ti-check" style="font-size:12px"></i>':''}</div></div>`;
      top.querySelector('.check-circle').onclick=()=>toggleDone(i);
      top.querySelector('.r-name').onclick=()=>toggleDone(i);
      top.querySelector('.r-icon').onclick=()=>toggleDone(i);
      top.querySelector('.memo-btn').onclick=(e)=>{e.stopPropagation();toggleMemoEdit(i);};
      top.querySelector('.del-r-btn').onclick=(e)=>{e.stopPropagation();deleteRoutine(i);};
    }
    wrap.appendChild(top);
    if(!sortMode){
      if(hasMemo&&!isOpen){const disp=document.createElement('div');disp.className='r-memo-display';disp.textContent=r.memo;wrap.appendChild(disp);}
      const ew=document.createElement('div');ew.className='r-memo-edit'+(isOpen?' open':'');
      const ta=document.createElement('textarea');ta.className='r-memo-ta';ta.placeholder='세부 내용을 입력하세요…';ta.value=r.memo||'';ta.rows=3;
      const br=document.createElement('div');br.className='memo-save-row';
      const cb2=document.createElement('button');cb2.className='memo-cancel-btn';cb2.textContent='취소';cb2.onclick=()=>{openMemoIdx=-1;renderDailyRoutines();};
      const ob=document.createElement('button');ob.className='memo-ok-btn';ob.textContent='저장';
      ob.onclick=()=>{dd.routines[i].memo=ta.value.trim();openMemoIdx=-1;sched(dk(curYear,curMonth,curDay),dd);renderDailyRoutines();};
      br.appendChild(cb2);br.appendChild(ob);ew.appendChild(ta);ew.appendChild(br);wrap.appendChild(ew);
      if(isOpen)requestAnimationFrame(()=>ta.focus());
    }
    list.appendChild(wrap);
  });
  updateProgress();
}
function toggleMemoEdit(i){openMemoIdx=(openMemoIdx===i)?-1:i;renderDailyRoutines();}
function toggleDone(i){
  const dd=getDay(curYear,curMonth,curDay);const r=dd.routines[i];
  const cids=new Set(DR2.filter(r=>r.countMode).map(r=>r.id));
  if(r.countMode||cids.has(r.id)){r.count=(r.count||0)>=1?0:(r.count||0)+1;r.done=r.count>=1;}
  else r.done=!r.done;
  sched(dk(curYear,curMonth,curDay),dd);renderDailyRoutines();
}
function deleteRoutine(i){const dd=getDay(curYear,curMonth,curDay);dd.routines.splice(i,1);if(openMemoIdx===i)openMemoIdx=-1;sched(dk(curYear,curMonth,curDay),dd);renderDailyRoutines();renderPresets();}
function updateProgress(){
  const dd=getDay(curYear,curMonth,curDay);
  const cids=new Set(DR2.filter(r=>r.countMode).map(r=>r.id));
  const total=dd.routines.length;
  const done=dd.routines.filter(r=>(r.countMode||cids.has(r.id))?(r.count||0)>=1:r.done).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog-count').textContent=`달성 ${done}/${total}`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=pct+'%';
}
function renderPresets(){
  const dd=getDay(curYear,curMonth,curDay);const eids=new Set(dd.routines.map(r=>r.id));
  const ps=document.getElementById('preset-scroll');ps.innerHTML='';
  DR2.filter(r=>!eids.has(r.id)).forEach(r=>{
    const c=document.createElement('div');c.className='preset-chip';
    c.innerHTML=`<span>${r.icon}</span><span>${r.name}</span>`;
    c.onclick=()=>{dd.routines.push({...r,done:false,memo:'',count:0});sched(dk(curYear,curMonth,curDay),dd);renderDailyRoutines();renderPresets();};
    ps.appendChild(c);
  });
  if(!ps.children.length)ps.innerHTML=`<span style="font-size:12px;color:var(--text-muted)">추가할 기본 루틴이 없어요</span>`;
}
function toggleCustomInput(){const r=document.getElementById('custom-input-row');if(r.classList.contains('open')){closeCustomInput();}else{r.classList.add('open');document.getElementById('ci-icon-input').focus();}}
window.toggleCustomInput=toggleCustomInput;
function closeCustomInput(){document.getElementById('custom-input-row').classList.remove('open');document.getElementById('ci-name').value='';document.getElementById('ci-icon-input').value='';}
function addCustomRoutine(){const name=document.getElementById('ci-name').value.trim();if(!name)return;const icon=document.getElementById('ci-icon-input').value.trim()||'⭐';const dd=getDay(curYear,curMonth,curDay);dd.routines.push({id:'c'+Date.now(),icon,name,done:false,memo:'',countMode:false,count:0});sched(dk(curYear,curMonth,curDay),dd);renderDailyRoutines();renderPresets();closeCustomInput();}
window.addCustomRoutine=addCustomRoutine;
function saveDay(){const dd=getDay(curYear,curMonth,curDay);dd.gratitude=document.getElementById('gratitude-text').value;saveDay2FB(dk(curYear,curMonth,curDay),dd);showView('cal');}
window.saveDay=saveDay;

/* ── 기본 루틴 편집 ── */
function renderEditView(){editTemp=JSON.parse(JSON.stringify(DR2));renderEditList();}
function renderEditList(){
  const list=document.getElementById('edit-list');list.innerHTML='';
  editTemp.forEach((r,i)=>{
    const isF=i===0;const row=document.createElement('div');row.className='edit-row';
    row.innerHTML=`<div class="order-btns"><button class="ob" onclick="moveR(${i},-1)" ${i===0?'disabled':''}><i class="ti ti-chevron-up"></i></button><button class="ob" onclick="moveR(${i},1)" ${i===editTemp.length-1?'disabled':''}><i class="ti ti-chevron-down"></i></button></div>
      <input class="e-icon-input" value="${r.icon||'⭐'}" maxlength="2" data-i="${i}" ${isF?'style="border-color:var(--green)"':''}/>
      <input class="e-name-input" value="${r.name.replace(/"/g,'&quot;')}" data-i="${i}" placeholder="루틴 이름" ${isF?'style="font-weight:500"':''}/>
      ${isF?'<span class="one-badge">원씽</span>':''}
      <button class="del-btn" onclick="delEditR(${i})"><i class="ti ti-trash"></i></button>
      <div style="width:100%;display:flex;align-items:center;gap:8px;padding-left:64px;">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--text-secondary);">
          <input type="checkbox" ${r.countMode?'checked':''} data-ci="${i}" style="accent-color:var(--green);width:14px;height:14px;"> 횟수 카운트 (월목표에서 목표 설정)
        </label>
      </div>`;
    row.querySelector('.e-name-input').addEventListener('input',function(){editTemp[+this.dataset.i].name=this.value;});
    row.querySelector('.e-icon-input').addEventListener('input',function(){editTemp[+this.dataset.i].icon=this.value||'⭐';});
    row.querySelector('input[type="checkbox"]').addEventListener('change',function(){editTemp[+this.dataset.ci].countMode=this.checked;renderEditList();});
    list.appendChild(row);
  });
}
function moveR(i,d){const j=i+d;if(j<0||j>=editTemp.length)return;[editTemp[i],editTemp[j]]=[editTemp[j],editTemp[i]];renderEditList();}
window.moveR=moveR;
function delEditR(i){editTemp.splice(i,1);renderEditList();}
window.delEditR=delEditR;
function addDefaultRoutine(){editTemp.push({id:'d'+Date.now(),icon:'⭐',name:'',countMode:false});renderEditList();document.querySelectorAll('.e-name-input')[editTemp.length-1]?.focus();}
window.addDefaultRoutine=addDefaultRoutine;
async function saveDefaults(){const v=editTemp.filter(r=>r.name.trim()).map(r=>({...r,icon:r.icon||'⭐',countMode:!!r.countMode}));if(!v.length){alert('루틴이 최소 1개 필요해요.');return;}DR2=v;await saveDef2FB();showView('setting');}
window.saveDefaults=saveDefaults;

/* ── 월별 목표 ── */
function openMGoalModal(){
  const k=mgk(curYear,curMonth);
  document.getElementById('mgoal-title').textContent=`${String(curYear).slice(2)}년 ${MO[curMonth]} 카운트 목표`;
  const cr=DR2.filter(r=>r.countMode);const list=document.getElementById('mgoal-list');list.innerHTML='';
  if(!cr.length){list.innerHTML='<div style="padding:2rem 1rem;text-align:center;font-size:13px;color:var(--text-muted);">설정에서 횟수 카운트 루틴을 먼저 등록해주세요.</div>';}
  else cr.forEach(r=>{const cur=getMT(r.id,curYear,curMonth);const row=document.createElement('div');row.className='mgoal-row';row.innerHTML=`<span class="mgoal-icon">${r.icon}</span><span class="mgoal-name">${r.name}</span><input class="mgoal-input" type="number" min="0" max="9999" value="${cur}" data-rid="${r.id}"/><span class="mgoal-unit">회</span>`;list.appendChild(row);});
  document.getElementById('mgoal-overlay').classList.add('open');
}
window.openMGoalModal=openMGoalModal;
function closeMGoalModal(){document.getElementById('mgoal-overlay').classList.remove('open');}
window.closeMGoalModal=closeMGoalModal;
async function saveMGoal(){const k=mgk(curYear,curMonth);if(!monthGoals[k])monthGoals[k]={};document.querySelectorAll('.mgoal-input').forEach(inp=>{monthGoals[k][inp.dataset.rid]=Math.max(0,parseInt(inp.value)||0);});await saveMG2FB(k,monthGoals[k]);closeMGoalModal();renderCalendar();}
window.saveMGoal=saveMGoal;

/* ── 통계 ── */
function setStatsScope(s){statsScope=s;document.getElementById('scope-btn-month').classList.toggle('active',s==='month');document.getElementById('scope-btn-year').classList.toggle('active',s==='year');renderStats();}
window.setStatsScope=setStatsScope;
function statsPrev(){if(statsScope==='month'){statsMonth--;if(statsMonth<0){statsYear--;statsMonth=11;}}else statsYear--;renderStats();}
function statsNext(){if(statsScope==='month'){statsMonth++;if(statsMonth>11){statsYear++;statsMonth=0;}}else statsYear++;renderStats();}
window.statsPrev=statsPrev;window.statsNext=statsNext;
function renderStats(){if(statsScope==='month')renderMS();else renderYS();}
function stSec(t){const el=document.createElement('div');el.className='rst-section-title';el.textContent=t;return el;}
function stCards(items){const d=document.createElement('div');d.className='stats-cards';d.style.paddingTop='8px';d.innerHTML=items.map(([l,v,s,c])=>`<div class="sc"><div class="sl">${l}</div><div class="sv"${c?` style="color:${c}"`:''}>${v}</div>${s?`<div class="ss">${s}</div>`:''}</div>`).join('');return d;}
function renderMS(){
  document.getElementById('stats-period-label').textContent=`${statsYear}년 ${MO[statsMonth]}`;
  const days=new Date(statsYear,statsMonth+1,0).getDate();
  const cids=new Set(DR2.filter(r=>r.countMode).map(r=>r.id));
  const ct={},rc={};let rec=0,ot=0,gd=0;
  for(let d=1;d<=days;d++){
    const dd=state[dk(statsYear,statsMonth,d)];if(!dd||!dd.routines||!dd.routines.length)continue;
    rec++;if(dd.gratitude?.trim())gd++;if(dd.routines[0]?.memo?.trim())ot++;
    dd.routines.forEach(r=>{
      const ic=r.countMode||cids.has(r.id);
      if(ic){if(!ct[r.id])ct[r.id]={name:r.name,icon:r.icon,count:0,target:getMT(r.id,statsYear,statsMonth)};ct[r.id].count+=r.done?Math.max(r.count||0,1):(r.count||0);}
      else{if(!rc[r.id])rc[r.id]={name:r.name,icon:r.icon,done:0,total:0};rc[r.id].total++;if(r.done)rc[r.id].done++;}
    });
  }
  const wk='week-'+weekKey(curWeekMon);const wd=growData[wk]||{goals:[]};const wg=wd.goals||[];const wdone=wg.filter(g=>g.done).length;
  const q=Math.floor(statsMonth/3)+1;const qd=growData[`quarter-${statsYear}-Q${q}`]||{goals:[]};const qg=qd.goals||[];const qdone=qg.filter(g=>g.done).length;
  const body=document.getElementById('stats-body');body.innerHTML='';
  body.appendChild(stSec('📅 기록 현황'));
  body.appendChild(stCards([['기록한 날',`${rec}일`,`총 ${days}일 중`],['원씽 메모',`${ot}일`,`${days>0?Math.round(ot/days*100):0}%`],['감사일기',`${gd}일`,`${days>0?Math.round(gd/days*100):0}%`]]));
  body.appendChild(stSec('🌱 성장 목표 요약'));
  body.appendChild(stCards([['이번 주 목표',wg.length?`${wdone}/${wg.length}`:'미설정',wg.length?`${Math.round(wdone/wg.length*100)}%`:'성장탭에서 설정',wdone===wg.length&&wg.length?'var(--green)':''],[`Q${q} 목표`,qg.length?`${qdone}/${qg.length}`:'미설정',qg.length?`${Math.round(qdone/qg.length*100)}%`:'성장탭에서 설정',qdone===qg.length&&qg.length?'var(--green)':'']]));
  if(Object.keys(ct).length){
    body.appendChild(stSec('🔢 카운트 루틴 — 월 누적'));
    Object.values(ct).forEach(v=>{const p=v.target>0?Math.min(100,Math.round(v.count/v.target*100)):0;const ok=v.count>=v.target;const row=document.createElement('div');row.className='count-stat-row';row.innerHTML=`<span class="csr-icon">${v.icon}</span><span class="csr-name">${v.name}</span><div class="rb-w" style="width:80px"><div class="rb" style="width:${p}%;background:${ok?'var(--accent)':'var(--green)'}"></div></div><span class="csr-val" style="color:${ok?'var(--green)':'var(--text)'}">${v.count}<span class="csr-target"> / ${v.target}</span></span>`;body.appendChild(row);});
  }
  const ce=Object.values(rc).filter(v=>v.total>0).sort((a,b)=>(b.done/b.total)-(a.done/a.total));
  if(ce.length){
    body.appendChild(stSec('✅ 루틴 달성 현황'));
    ce.forEach(v=>{const p=Math.round(v.done/v.total*100);const row=document.createElement('div');row.className='rst-row';row.innerHTML=`<span class="ri">${v.icon}</span><span class="rn">${v.name}</span><div class="rb-w"><div class="rb" style="width:${p}%"></div></div><span class="rp">${p}%</span>`;body.appendChild(row);});
  }
}
function renderYS(){
  document.getElementById('stats-period-label').textContent=`${statsYear}년`;
  const cids=new Set(DR2.filter(r=>r.countMode).map(r=>r.id));
  let yr=0,yo=0,yg=0;const mb=[];
  for(let m=0;m<12;m++){
    const days=new Date(statsYear,m+1,0).getDate();let mr=0,md=0,mt=0;
    for(let d=1;d<=days;d++){const dd=state[dk(statsYear,m,d)];if(!dd||!dd.routines||!dd.routines.length)continue;mr++;yr++;if(dd.gratitude?.trim())yg++;if(dd.routines[0]?.memo?.trim())yo++;const done=dd.routines.filter(r=>(r.countMode||cids.has(r.id))?(r.count||0)>=1:r.done).length;md+=done;mt+=dd.routines.length;}
    mb.push({pct:mt>0?Math.round(md/mt*100):0,rec:mr});
  }
  const yd=growData[`year-${statsYear}`]||{goals:[]};const yg2=yd.goals||[];const ydone=yg2.filter(g=>g.done).length;
  const qs=[1,2,3,4].map(q=>{const d=growData[`quarter-${statsYear}-Q${q}`]||{goals:[]};const gl=d.goals||[];return{q,done:gl.filter(g=>g.done).length,total:gl.length};});
  const body=document.getElementById('stats-body');body.innerHTML='';
  body.appendChild(stSec('📅 연간 기록 요약'));
  body.appendChild(stCards([['기록한 날',`${yr}일`,`${statsYear}년 전체`],['원씽 메모',`${yo}일`,''],['감사일기',`${yg}일`,'']]));
  const yp=yg2.length?Math.round(ydone/yg2.length*100):0;
  body.appendChild(stSec('🎯 연간 목표'));
  body.appendChild(stCards([[`${statsYear}년 목표`,yg2.length?`${ydone}/${yg2.length}`:'미설정',yg2.length?`달성률 ${yp}%`:'성장탭에서 설정',ydone===yg2.length&&yg2.length?'var(--green)':'']]));
  body.appendChild(stSec('📊 분기별 목표 달성'));
  const qr=document.createElement('div');qr.style.cssText='padding:0 1rem 4px;';
  qs.forEach(({q,done,total})=>{const p=total?Math.round(done/total*100):0;const r=document.createElement('div');r.className='mb-row';r.innerHTML=`<span class="mb-label">Q${q}</span><div class="mb-bar-wrap"><div class="mb-bar" style="width:${p}%;background:${done===total&&total?'var(--accent)':'var(--green)'}"></div></div><span class="mb-pct">${total?`${done}/${total}`:'미설정'}</span>`;qr.appendChild(r);});
  body.appendChild(qr);
  body.appendChild(stSec('📈 월별 루틴 달성률'));
  const bars=document.createElement('div');bars.className='month-bars';
  mb.forEach((m,idx)=>{const r=document.createElement('div');r.className='mb-row';r.innerHTML=`<span class="mb-label">${idx+1}월</span><div class="mb-bar-wrap"><div class="mb-bar" style="width:${m.pct}%"></div></div><span class="mb-pct">${m.rec>0?m.pct+'%':'-'}</span>`;bars.appendChild(r);});
  body.appendChild(bars);
}

/* ── 성장 탭 ── */
function getMonday(date){const d=new Date(date);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1));d.setHours(0,0,0,0);return d;}
function weekKey(mon){return`${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;}
function fmtWeek(mon){const sun=new Date(mon);sun.setDate(sun.getDate()+6);return`${mon.getFullYear()}년 ${mon.getMonth()+1}/${mon.getDate()} ~ ${sun.getMonth()+1}/${sun.getDate()}`;}
function setGrowTab(t){
  growTab=t;
  ['week','qyear','review','imsang'].forEach(n=>{document.getElementById('gtab-'+n).classList.toggle('active',n===t);document.getElementById('gpanel-'+n).style.display=n===t?'flex':'none';});
  if(t==='week')renderWeekGoal();if(t==='qyear')renderQY();if(t==='review')renderReview();if(t==='imsang')renderImsang();
}
window.setGrowTab=setGrowTab;
function renderGrowView(){setGrowTab(growTab);}

/* 주간 */
function renderWeekGoal(){
  const k='week-'+weekKey(curWeekMon);const d=growData[k]||{focus:'',goals:[]};
  document.getElementById('week-label').textContent=fmtWeek(curWeekMon);
  document.getElementById('week-focus').value=d.focus||'';
  renderGoalList('week-goal-list',d.goals||[],'week');
}
function renderGoalList(elId,goals,type){
  const el=document.getElementById(elId);el.innerHTML='';
  goals.forEach((g,i)=>{
    const row=document.createElement('div');row.className='goal-item';
    row.innerHTML=`<div class="goal-check${g.done?' done':''}" onclick="toggleGoal('${type}',${i})">${g.done?'<i class="ti ti-check" style="font-size:11px"></i>':''}</div><span class="goal-text${g.done?' done-text':''}">${g.text}</span><button class="goal-del" onclick="delGoal('${type}',${i})"><i class="ti ti-x"></i></button>`;
    el.appendChild(row);
  });
  if(goals.length){const pr=document.createElement('div');pr.className='goal-prog-row';const dn=goals.filter(g=>g.done).length;const p=Math.round(dn/goals.length*100);pr.innerHTML=`<div class="goal-prog-track"><div class="goal-prog-fill" style="width:${p}%"></div></div><span class="goal-prog-label">${dn}/${goals.length}</span>`;el.appendChild(pr);}
}
function getGoals(type){
  if(type==='week'){const k='week-'+weekKey(curWeekMon);return(growData[k]||{goals:[]}).goals||[];}
  if(type==='year'){const k=`year-${curYearGoal}`;return(growData[k]||{goals:[]}).goals||[];}
  if(type==='quarter'){const k=`quarter-${curYearGoal}-Q${curQuarter}`;return(growData[k]||{goals:[]}).goals||[];}
  return[];
}
function setGoals(type,goals){
  if(type==='week'){const k='week-'+weekKey(curWeekMon);if(!growData[k])growData[k]={focus:'',goals:[]};growData[k].goals=goals;}
  if(type==='year'){const k=`year-${curYearGoal}`;if(!growData[k])growData[k]={goals:[]};growData[k].goals=goals;}
  if(type==='quarter'){const k=`quarter-${curYearGoal}-Q${curQuarter}`;if(!growData[k])growData[k]={goals:[]};growData[k].goals=goals;}
}
function toggleGoal(type,i){const gl=getGoals(type);gl[i].done=!gl[i].done;setGoals(type,gl);refreshGoalUI(type);}
window.toggleGoal=toggleGoal;
function delGoal(type,i){const gl=getGoals(type);gl.splice(i,1);setGoals(type,gl);refreshGoalUI(type);}
window.delGoal=delGoal;
function refreshGoalUI(type){
  if(type==='week')renderGoalList('week-goal-list',getGoals('week'),'week');
  if(type==='year')renderGoalList('year-goal-list',getGoals('year'),'year');
  if(type==='quarter')renderGoalList('quarter-goal-list',getGoals('quarter'),'quarter');
}
function addWeekGoal(){const inp=document.getElementById('week-goal-input');const t=inp.value.trim();if(!t)return;const gl=getGoals('week');gl.push({text:t,done:false});setGoals('week',gl);inp.value='';renderGoalList('week-goal-list',gl,'week');}
window.addWeekGoal=addWeekGoal;
function saveWeekGoal(){const k='week-'+weekKey(curWeekMon);const d=growData[k]||{focus:'',goals:[]};d.focus=document.getElementById('week-focus').value;saveGrow(k,d);}
window.saveWeekGoal=saveWeekGoal;
function weekPrev(){curWeekMon=new Date(curWeekMon);curWeekMon.setDate(curWeekMon.getDate()-7);renderWeekGoal();}
function weekNext(){curWeekMon=new Date(curWeekMon);curWeekMon.setDate(curWeekMon.getDate()+7);renderWeekGoal();}
window.weekPrev=weekPrev;window.weekNext=weekNext;

/* 분기·연간 */
function renderQY(){
  document.getElementById('year-goal-label').textContent=`${curYearGoal}년`;
  document.getElementById('quarter-label').textContent=`${curYearGoal}년 Q${curQuarter}`;
  renderGoalList('year-goal-list',getGoals('year'),'year');
  renderGoalList('quarter-goal-list',getGoals('quarter'),'quarter');
}
function addYearGoal(){const inp=document.getElementById('year-goal-input');const t=inp.value.trim();if(!t)return;const gl=getGoals('year');gl.push({text:t,done:false});setGoals('year',gl);inp.value='';renderGoalList('year-goal-list',gl,'year');}
window.addYearGoal=addYearGoal;
function addQuarterGoal(){const inp=document.getElementById('quarter-goal-input');const t=inp.value.trim();if(!t)return;const gl=getGoals('quarter');gl.push({text:t,done:false});setGoals('quarter',gl);inp.value='';renderGoalList('quarter-goal-list',gl,'quarter');}
window.addQuarterGoal=addQuarterGoal;
function saveQYearGoals(){saveGrow(`year-${curYearGoal}`,growData[`year-${curYearGoal}`]||{goals:[]});saveGrow(`quarter-${curYearGoal}-Q${curQuarter}`,growData[`quarter-${curYearGoal}-Q${curQuarter}`]||{goals:[]});}
window.saveQYearGoals=saveQYearGoals;
function yearGoalPrev(){curYearGoal--;renderQY();}function yearGoalNext(){curYearGoal++;renderQY();}
function quarterPrev(){curQuarter--;if(curQuarter<1){curYearGoal--;curQuarter=4;}renderQY();}
function quarterNext(){curQuarter++;if(curQuarter>4){curYearGoal++;curQuarter=1;}renderQY();}
window.yearGoalPrev=yearGoalPrev;window.yearGoalNext=yearGoalNext;window.quarterPrev=quarterPrev;window.quarterNext=quarterNext;

/* 월간 회고 */
function renderReview(){
  document.getElementById('review-label').textContent=`${reviewYear}년 ${MO[reviewMonth]} 회고`;
  const k=`review-${reviewYear}-${String(reviewMonth+1).padStart(2,'0')}`;
  const d=growData[k]||{good:'',bad:'',next:''};
  document.getElementById('review-good').value=d.good||'';
  document.getElementById('review-bad').value=d.bad||'';
  document.getElementById('review-next').value=d.next||'';
}
function saveReview(){const k=`review-${reviewYear}-${String(reviewMonth+1).padStart(2,'0')}`;saveGrow(k,{good:document.getElementById('review-good').value,bad:document.getElementById('review-bad').value,next:document.getElementById('review-next').value});}
window.saveReview=saveReview;
function reviewPrev(){reviewMonth--;if(reviewMonth<0){reviewYear--;reviewMonth=11;}renderReview();}
function reviewNext(){reviewMonth++;if(reviewMonth>11){reviewYear++;reviewMonth=0;}renderReview();}
window.reviewPrev=reviewPrev;window.reviewNext=reviewNext;

/* 임장 기록 (월 단위) */
function imsangKey(){return`imsang-${imsangYear}-${String(imsangMonth+1).padStart(2,'0')}`;}
function renderImsang(){
  document.getElementById('imsang-label').textContent=`${imsangYear}년 ${MO[imsangMonth]} 임장`;
  const k=imsangKey();const d=growData[k]||{};
  document.getElementById('imsang-region').value=d.region||'';
  document.getElementById('imsang-date').value=d.date||`${imsangYear}-${String(imsangMonth+1).padStart(2,'0')}-01`;
  document.getElementById('imsang-price').value=d.price||'';
  document.getElementById('imsang-feature').value=d.feature||'';
  document.getElementById('imsang-memo').value=d.memo||'';
  curImsangVerdict=d.verdict||'';
  updateVerdictUI();
}
function setImsangVerdict(v){curImsangVerdict=(curImsangVerdict===v)?'':v;updateVerdictUI();}
window.setImsangVerdict=setImsangVerdict;
function updateVerdictUI(){
  const colors={'긍정':'var(--green)','보류':'#F5A623','패스':'var(--red)'};
  ['긍정','보류','패스'].forEach(v=>{
    const btn=document.getElementById('vbtn-'+v);if(!btn)return;
    const sel=curImsangVerdict===v;
    btn.style.background=sel?colors[v]:'transparent';
    btn.style.color=sel?'#fff':'var(--text-secondary)';
    btn.style.borderColor=sel?colors[v]:'var(--border)';
  });
}
async function saveImsang(){
  const k=imsangKey();
  await saveGrow(k,{
    region:document.getElementById('imsang-region').value.trim(),
    date:document.getElementById('imsang-date').value,
    price:document.getElementById('imsang-price').value.trim(),
    feature:document.getElementById('imsang-feature').value.trim(),
    memo:document.getElementById('imsang-memo').value.trim(),
    verdict:curImsangVerdict,
    updatedAt:new Date().toISOString()
  });
  alert('임장 기록이 저장됐어요!');
}
window.saveImsang=saveImsang;
function imsangPrev(){imsangMonth--;if(imsangMonth<0){imsangYear--;imsangMonth=11;}renderImsang();}
function imsangNext(){imsangMonth++;if(imsangMonth>11){imsangYear++;imsangMonth=0;}renderImsang();}
window.imsangPrev=imsangPrev;window.imsangNext=imsangNext;

/* ── PDF ── */
function getRDays(scope){
  const all=Object.keys(state).filter(k=>state[k]&&state[k].routines&&state[k].routines.length>0);
  if(scope==='month'){const pre=`${curYear}-${String(curMonth+1).padStart(2,'0')}-`;return all.filter(k=>k.startsWith(pre)).sort();}
  return all.sort();
}
function k2label(k){const[y,m,d]=k.split('-').map(Number);const o=new Date(y,m-1,d);return`${String(y).slice(2)}년 ${m}월 ${d}일 (${WD[o.getDay()]})`;}
function openPdfModal(mode){
  if(mode==='day'){
    document.getElementById('pdf-modal-title').textContent='오늘 일자 PDF';
    document.getElementById('pdf-modal-sub').textContent='현재 날짜 기록을 PDF로 저장해요';
    document.getElementById('pdf-scope-row').style.display='none';
    const k=dk(curYear,curMonth,curDay);const dd=state[k];
    document.getElementById('pdf-day-count').textContent=dd?`달성 ${dd.routines.filter(r=>r.done).length}/${dd.routines.length}`:'';
    document.getElementById('pdf-day-list').innerHTML=`<div class="pdf-day-chip has-done">${k2label(k)}</div>`;
    buildPA([k]);document.getElementById('pdf-go-btn').disabled=false;
  } else {
    pdfScope='month';document.getElementById('pdf-modal-title').textContent='전체 기록 PDF';
    document.getElementById('pdf-modal-sub').textContent='기록이 있는 날짜를 한 번에 저장해요';
    document.getElementById('pdf-scope-row').style.display='flex';
    document.getElementById('scope-month').classList.add('active');document.getElementById('scope-all').classList.remove('active');
    updatePP();
  }
  document.getElementById('pdf-overlay').classList.add('open');
}
window.openPdfModal=openPdfModal;
function setPdfScope(s){pdfScope=s;document.getElementById('scope-month').classList.toggle('active',s==='month');document.getElementById('scope-all').classList.toggle('active',s==='all');updatePP();}
window.setPdfScope=setPdfScope;
function updatePP(){
  const keys=getRDays(pdfScope);const btn=document.getElementById('pdf-go-btn');
  if(!keys.length){document.getElementById('pdf-day-count').textContent='기록된 날짜가 없어요';document.getElementById('pdf-day-list').innerHTML='';btn.disabled=true;buildPA([]);return;}
  btn.disabled=false;document.getElementById('pdf-day-count').textContent=`총 ${keys.length}일 · 날짜별 1페이지씩 저장돼요`;
  const le=document.getElementById('pdf-day-list');le.innerHTML='';
  keys.forEach(k=>{const dd=state[k];const done=dd.routines.filter(r=>r.done).length;const c=document.createElement('div');c.className='pdf-day-chip'+(done>0?' has-done':'');c.textContent=k2label(k)+` · ${done}/${dd.routines.length}`;le.appendChild(c);});
  buildPA(keys);
}
function buildPA(keys){
  const target=document.getElementById('print-area');
  if(!keys||!keys.length){target.innerHTML='<div style="padding:40px;text-align:center;color:#999;">저장할 기록이 없어요</div>';return;}
  target.innerHTML=keys.map(k=>{
    const dd=state[k];if(!dd||!dd.routines)return'';
    const label=k2label(k);const total=dd.routines.length,done=dd.routines.filter(r=>r.done).length;const pct=total>0?Math.round(done/total*100):0;
    let html=`<div class="p-day-page"><div class="p-header"><div class="p-date">${label}</div><div class="p-prog">달성 ${done}/${total} · ${pct}%</div></div><div class="p-section-title">루틴 체크리스트</div>`;
    dd.routines.forEach(r=>{const tmp=document.createElement('div');tmp.textContent=r.memo||'';html+=`<div class="p-routine"><div class="p-check ${r.done?'done':''}"></div><div class="p-r-icon">${r.icon||''}</div><div class="p-r-body"><div class="p-r-name">${r.name||''}</div>${r.memo?`<div class="p-r-memo">${tmp.innerHTML}</div>`:''}</div></div>`;});
    if(dd.gratitude?.trim()){const tmp2=document.createElement('div');tmp2.textContent=dd.gratitude;html+=`<div class="p-section-title">🙏 감사일기</div><div class="p-gratitude">${tmp2.innerHTML}</div>`;}
    html+=`<div class="p-footer">루틴 다이어리 · ${label}</div></div>`;return html;
  }).join('');
}
function closePdfModal(){document.getElementById('pdf-overlay').classList.remove('open');}
window.closePdfModal=closePdfModal;
function doPrint(){closePdfModal();requestAnimationFrame(()=>requestAnimationFrame(()=>window.print()));}
window.doPrint=doPrint;
