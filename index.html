<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>뤠 다이어리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
/* CSS 부분은 이전과 동일한 스타일 유지 (생략) */
:root{--bg:#ffffff;--surface:#f7f7f5;--border:rgba(0,0,0,0.1);--green:#1D9E75;--accent:#378ADD;}
body{font-family:sans-serif;background:var(--bg);max-width:480px;margin:0 auto;}
.view{display:none;} .view.active{display:block;}
.cal-day{border:0.5px solid var(--border);height:60px;cursor:pointer;}
.rst-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.rb-w{flex:1;height:8px;background:#eee;border-radius:4px;}
.rb{height:100%;background:var(--green);border-radius:4px;}
</style>
</head>
<body>
<div class="app">
    <!-- 뷰/메뉴 구조는 이전과 동일 -->
    <div id="view-cal" class="view active">
        <div id="cal-title"></div><div id="cal-grid" style="display:grid; grid-template-columns:repeat(7,1fr);"></div>
        <button onclick="showView('stats')">통계 보기</button>
    </div>
    <div id="view-stats" class="view">
        <h2 id="stats-month-label"></h2>
        <div id="stats-controls">
            <button onclick="renderStats('month')">이번 달</button>
            <button onclick="renderStats('all')">전체 누적</button>
        </div>
        <div id="stats-content"></div>
        <button onclick="showView('cal')">뒤로</button>
    </div>
</div>

<script>
// ★Config 값 꼭 넣으세요★
const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "...", measurementId: "..." };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("diary_app").doc("my_records");

let state={}, defaultRoutines=[], curYear, curMonth;

// [통합 통계 함수: 월별/누적 + 루틴별 상세]
function renderStats(mode = 'month') {
    let statsTitle = (mode === 'month') ? `${curYear}년 ${curMonth+1}월` : "전체 누적";
    document.getElementById('stats-month-label').textContent = statsTitle;
    
    let totalDone = 0, totalCount = 0;
    let routineStats = {}; // 루틴별 통계 저장용

    Object.keys(state).forEach(dateKey => {
        if(mode === 'month' && !dateKey.startsWith(`${curYear}-${String(curMonth+1).padStart(2,'0')}`)) return;
        
        const dd = state[dateKey];
        dd.routines.forEach(r => {
            if(!routineStats[r.name]) routineStats[r.name] = {done:0, total:0, icon:r.icon};
            routineStats[r.name].total++;
            if(r.done) routineStats[r.name].done++;
            totalDone += r.done ? 1 : 0;
            totalCount++;
        });
    });
    
    const pct = totalCount > 0 ? Math.round((totalDone / totalCount) * 100) : 0;
    let html = `<h3>전체 달성률: ${pct}%</h3>`;
    
    // 루틴별 막대 그래프 그리기
    Object.keys(routineStats).forEach(name => {
        const r = routineStats[name];
        const rPct = Math.round((r.done / r.total) * 100);
        html += `<div class="rst-row">
            <span>${r.icon}</span> <span>${name}</span>
            <div class="rb-w"><div class="rb" style="width:${rPct}%"></div></div>
            <span>${rPct}%</span>
        </div>`;
    });
    
    document.getElementById('stats-content').innerHTML = html;
}

// [PDF 백지 방지]
function doPrint(){
    document.getElementById('pdf-overlay').style.display='none';
    setTimeout(() => { window.print(); }, 500); 
}

// 이전의 load, saveState, renderCalendar 등 필수 함수들은 그대로 유지
function load(){ /* 이전 코드 그대로 */ }
function showView(v){ /* 이전 코드 그대로 */ }
load();
const now=new Date(); curYear=now.getFullYear(); curMonth=now.getMonth();
</script>
</body>
</html>
