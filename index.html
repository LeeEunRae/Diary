<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Rae's Diary</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
/* 통합본 스타일 */
:root{--bg:#ffffff;--surface:#f7f7f5;--border:rgba(0,0,0,0.1);--green:#1D9E75;--accent:#378ADD;}
body{font-family:sans-serif;background:var(--bg);max-width:480px;margin:0 auto;}
.app{min-height:100vh;display:flex;flex-direction:column;}
.view{display:none;flex:1;}
.view.active{display:flex;flex-direction:column;}
.tab-bar{display:flex;border-top:1px solid var(--border);padding:10px;background:white;}
.tab-btn{flex:1;text-align:center;cursor:pointer;font-size:12px;background:none;border:none;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:10px;}
.cal-day{border:0.5px solid var(--border);min-height:60px;cursor:pointer;font-size:11px;}
.rst-row{display:flex;align-items:center;gap:10px;padding:8px 1rem;border-bottom:0.5px solid var(--border);}
.rb-w{flex:1;height:8px;background:#eee;border-radius:4px;}
.rb{height:100%;background:var(--green);border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <!-- [뷰 1: 캘린더] -->
  <div id="view-cal" class="view active">
    <div style="padding:1rem; font-weight:bold;" id="cal-title"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showView('cal')">캘린더</button>
      <button class="tab-btn" onclick="showView('edit')">루틴관리</button>
      <button class="tab-btn" onclick="showView('stats')">통계</button>
      <button class="tab-btn" onclick="openPdfModal('all')">PDF</button>
    </div>
  </div>

  <!-- [뷰 2: 루틴관리] -->
  <div id="view-edit" class="view">
    <div style="padding:1rem; border-bottom:1px solid var(--border);">루틴 관리 <button onclick="showView('cal')">닫기</button></div>
    <div id="edit-list" style="flex:1;"></div>
  </div>

  <!-- [뷰 3: 통계] -->
  <div id="view-stats" class="view">
    <div style="padding:1rem;">
        <h2 id="stats-month-label"></h2>
        <button onclick="renderStats('month')">이번 달</button>
        <button onclick="renderStats('all')">전체 누적</button>
        <div id="stats-content"></div>
        <button onclick="showView('cal')">닫기</button>
    </div>
  </div>

  <!-- 데일리 뷰 등은 이전 코드와 동일하게 유지 -->
</div>

<script>
// ★ 내 프로젝트 Config값 넣기 ★
const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "...", measurementId: "..." };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("diary_app").doc("my_records");

let state={}, defaultRoutines=[], curYear, curMonth;

function load(){
  docRef.get().then((doc) => {
    if(doc.exists) {
      state = doc.data().state || {};
      defaultRoutines = doc.data().defaultRoutines || [];
    }
    renderCalendar();
  });
}

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='cal') renderCalendar();
  if(v==='stats') renderStats();
}

function renderStats(mode = 'month') {
    let statsTitle = (mode === 'month') ? `${curYear}년 ${curMonth+1}월` : "전체 누적";
    document.getElementById('stats-month-label').textContent = statsTitle;
    
    let routineStats = {};
    Object.keys(state).forEach(dateKey => {
        if(mode === 'month' && !dateKey.startsWith(`${curYear}-${String(curMonth+1).padStart(2,'0')}`)) return;
        state[dateKey].routines.forEach(r => {
            if(!routineStats[r.name]) routineStats[r.name] = {done:0, total:0, icon:r.icon};
            routineStats[r.name].total++;
            if(r.done) routineStats[r.name].done++;
        });
    });
    
    let html = '';
    Object.keys(routineStats).forEach(name => {
        const r = routineStats[name];
        const rPct = Math.round((r.done / r.total) * 100);
        html += `<div class="rst-row"><span>${r.icon}</span> <span>${name}</span> <div class="rb-w"><div class="rb" style="width:${rPct}%"></div></div> <span>${rPct}%</span></div>`;
    });
    document.getElementById('stats-content').innerHTML = html;
}

load();
const now=new Date(); curYear=now.getFullYear(); curMonth=now.getMonth();
</script>
</body>
</html>
