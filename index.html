<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Rae's Diary</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
:root{--bg:#ffffff;--surface:#f7f7f5;--surface2:#efefed;--border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);--text:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;--accent:#378ADD;--green:#1D9E75;--red:#E24B4A;--radius:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--surface:#252523;--surface2:#2e2e2b;--border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.18);--text:#f0ede8;--text-secondary:#b4b2a9;--text-muted:#888780;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.view{display:none;flex:1;flex-direction:column;}
.view.active{display:flex;}

.sync-banner{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;font-size:11px;background:var(--surface);color:var(--text-muted);flex-shrink:0;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);}
.sync-dot.ok{background:var(--green);}
.sync-dot.syncing{background:#F5A623;animation:blink .8s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

.cal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem 0.75rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.cal-title{font-size:18px;font-weight:500;}
.cal-nav{display:flex;align-items:center;gap:6px;}
.cal-legend{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
.nb{width:28px;height:28px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:14px;}
.nb:hover{background:var(--surface);}
.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);padding:0.4rem 0.25rem 0;}
.wd{text-align:center;font-size:11px;color:var(--text-muted);padding:4px 0;font-weight:500;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0.2rem 0.25rem 1rem;gap:2px;}
.cal-day{border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;cursor:pointer;min-height:72px;gap:2px;transition:background .15s;padding:5px 1px;}
.cal-day:hover:not(.empty){background:var(--surface);}
.cal-day.empty{cursor:default;}
.cal-day.today .dn{width:22px;height:22px;border-radius:50%;background:var(--text);color:var(--bg);display:flex;align-items:center;justify-content:center;}
.dn{font-size:12px;line-height:1;flex-shrink:0;}
.cal-day.empty .dn{color:var(--text-muted);}
.day-memo-text{font-size:8px;color:var(--text-secondary);line-height:1.3;text-align:center;width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-all;padding:0 1px;margin-top:1px;}
.day-done-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:3px;}
.day-done{font-size:9px;font-weight:500;color:var(--green);}
.day-skip{font-size:9px;color:var(--text-muted);}
.dot-row{display:flex;gap:2px;min-height:5px;justify-content:center;flex-wrap:wrap;}
.dot{width:4px;height:4px;border-radius:50%;}
.dot-done{background:var(--green);}.dot-skip{background:var(--border-strong);}
.day-pct{font-size:9px;font-weight:600;color:var(--green);}
.day-pct.zero{color:var(--text-muted);}
/* 카운트 루틴 */
.count-row{display:flex;align-items:center;gap:8px;padding:6px 1rem 10px 52px;}
.count-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border-strong);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-secondary);flex-shrink:0;}
.count-btn:hover{background:var(--surface2);}
.count-val{font-size:15px;font-weight:500;min-width:20px;text-align:center;}
.count-target{font-size:12px;color:var(--text-muted);}
.count-bar-wrap{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.count-bar{height:100%;background:var(--green);border-radius:2px;transition:width .2s;}
.count-bar.over{background:var(--accent);}
/* 기본루틴 편집에 목표 횟수 입력 */
.e-target-input{width:48px;height:34px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;text-align:center;padding:0;flex-shrink:0;}
.e-target-input:focus{outline:none;border-color:var(--green);}
.e-target-label{font-size:11px;color:var(--text-muted);flex-shrink:0;}

.hd{display:flex;align-items:center;gap:6px;padding:0.875rem 1rem 0.75rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.hd-title{font-size:15px;font-weight:500;flex:1;}
.ib{width:28px;height:28px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px;flex-shrink:0;}
.ib:hover{background:var(--surface);}
.icon-txt-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--text-secondary);font-size:12px;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.icon-txt-btn:hover{background:var(--surface);color:var(--text);}
.icon-txt-btn i{font-size:14px;}
.icon-txt-btn.active{background:var(--surface2);border-color:var(--border-strong);color:var(--text);}

.prog-wrap{padding:0.65rem 1rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:5px;}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}

.routines-list{overflow-y:auto;}
.r-item{border-bottom:0.5px solid var(--border);transition:background .12s;}
.r-item-top{display:flex;align-items:center;gap:10px;padding:10px 1rem;}

.r-item.sort-mode{background:var(--surface);}
.sort-handle{width:28px;display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.sort-up,.sort-down{width:24px;height:20px;border-radius:4px;border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;padding:0;}
.sort-up:hover:not(:disabled),.sort-down:hover:not(:disabled){background:var(--surface2);color:var(--text);}
.sort-up:disabled,.sort-down:disabled{opacity:.2;cursor:default;}

.r-icon{font-size:17px;width:26px;text-align:center;flex-shrink:0;cursor:pointer;}
.r-name{flex:1;font-size:14px;cursor:pointer;}
.r-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.memo-btn{width:24px;height:24px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-muted);}
.memo-btn.has-memo{color:var(--green);}
.del-r-btn{width:24px;height:24px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;}
.del-r-btn:hover{color:var(--red);}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer;}
.check-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
.r-memo-display{padding:0 1rem 8px 52px;font-size:13px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;word-break:break-all;}
.r-memo-edit{display:none;padding:0 1rem 10px 52px;}
.r-memo-edit.open{display:block;}
.r-memo-ta{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;line-height:1.5;padding:7px 10px;resize:none;min-height:60px;}
.r-memo-ta:focus{outline:none;border-color:var(--green);}
.r-memo-ta::placeholder{color:var(--text-muted);}
.memo-save-row{display:flex;justify-content:flex-end;gap:6px;margin-top:5px;}
.memo-cancel-btn{padding:4px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit;}
.memo-ok-btn{padding:4px 10px;font-size:12px;border:none;border-radius:var(--radius);background:var(--green);color:#fff;cursor:pointer;font-family:inherit;}

.add-routine-bar{display:flex;align-items:center;gap:8px;padding:10px 1rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.preset-scroll{display:flex;gap:6px;flex:1;overflow-x:auto;padding-bottom:2px;}
.preset-scroll::-webkit-scrollbar{display:none;}
.preset-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;background:var(--surface);flex-shrink:0;}
.preset-chip:hover{border-color:var(--green);color:var(--green);}
.custom-add-btn{width:28px;height:28px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px;flex-shrink:0;}

/* 직접 입력 행 — 이모지를 텍스트로 직접 타이핑 */
.custom-input-row{display:none;align-items:center;gap:6px;padding:8px 1rem;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;}
.custom-input-row.open{display:flex;}
.ci-icon-input{width:40px;height:32px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:17px;text-align:center;padding:0;flex-shrink:0;}
.ci-icon-input:focus{outline:none;border-color:var(--green);}
.ci-name{flex:1;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;padding:5px 9px;height:32px;}
.ci-name:focus{outline:none;border-color:var(--green);}
.ci-ok{width:32px;height:32px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

.g-section{padding:1rem;border-top:0.5px solid var(--border);flex-shrink:0;}
.g-label{font-size:12px;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.g-textarea{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:15px;line-height:1.7;padding:12px 14px;resize:vertical;min-height:160px;}
.g-textarea:focus{outline:none;border-color:var(--green);}
.g-textarea::placeholder{color:var(--text-muted);}
.primary-btn{margin-top:8px;width:100%;padding:10px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.primary-btn:hover{opacity:.85;}

.tab-bar{display:flex;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;}
.tab-btn{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-size:10px;font-family:inherit;}
.tab-btn i{font-size:20px;}
.tab-btn.active{color:var(--accent);}

.edit-scroll{flex:1;overflow-y:auto;}
.edit-row{display:flex;align-items:center;gap:8px;padding:7px 1rem;border-bottom:0.5px solid var(--border);}
.order-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.ob{width:24px;height:22px;border-radius:4px;border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;padding:0;}
.ob:hover:not(:disabled){background:var(--surface);color:var(--text);}
.ob:disabled{opacity:.25;cursor:default;}
.e-icon-input{width:38px;height:34px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:17px;text-align:center;padding:0;flex-shrink:0;}
.e-icon-input:focus{outline:none;border-color:var(--green);}
.e-name-input{flex:1;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;padding:6px 10px;height:34px;}
.e-name-input:focus{outline:none;border-color:var(--green);}
.one-badge{font-size:9px;background:#E1F5EE;color:#0F6E56;border-radius:4px;padding:2px 5px;flex-shrink:0;white-space:nowrap;}
.del-btn{width:26px;height:26px;border-radius:var(--radius);border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.del-btn:hover{color:var(--red);}
.add-row-btn{display:flex;align-items:center;gap:8px;padding:11px 1rem;color:var(--accent);font-size:14px;cursor:pointer;border:none;background:transparent;width:100%;font-family:inherit;}
.add-row-btn:hover{background:var(--surface);}
.edit-footer{padding:1rem;flex-shrink:0;border-top:0.5px solid var(--border);}

/* 통계 */
.stats-hd{display:flex;align-items:center;gap:6px;padding:0.875rem 1rem 0.75rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.stats-hd-title{font-size:15px;font-weight:500;flex:1;}
.stats-scope-row{display:flex;gap:6px;padding:10px 1rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.stats-scope-btn{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:inherit;}
.stats-scope-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.stats-nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 1rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.stats-period-label{font-size:14px;font-weight:500;}
.stats-scroll{flex:1;overflow-y:auto;padding-bottom:1rem;}
.stats-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:1rem;}
.sc{background:var(--surface);border-radius:var(--radius);padding:12px;}
.sl{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.sv{font-size:22px;font-weight:500;}
.ss{font-size:11px;color:var(--text-secondary);margin-top:2px;}
.rst-section-title{font-size:12px;color:var(--text-muted);padding:0 1rem 6px;font-weight:500;}
.rst-row{display:flex;align-items:center;gap:10px;padding:8px 1rem;border-bottom:0.5px solid var(--border);}
.ri{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.rn{flex:1;font-size:13px;}
.rb-w{width:70px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.rb{height:100%;background:var(--green);border-radius:2px;}
.rp{font-size:12px;color:var(--text-secondary);min-width:30px;text-align:right;}
.month-bars{padding:0 1rem 1rem;}
.mb-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);}
.mb-label{font-size:12px;color:var(--text-secondary);width:28px;flex-shrink:0;}
.mb-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.mb-bar{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.mb-pct{font-size:11px;color:var(--text-secondary);min-width:32px;text-align:right;}

.pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
.pdf-overlay.open{display:flex;}
.pdf-modal{background:var(--bg);border-radius:12px;padding:1.5rem;width:320px;max-height:85vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.pdf-modal-title{font-size:15px;font-weight:500;}
.pdf-modal-sub{font-size:12px;color:var(--text-muted);}
.pdf-scope-row{display:flex;gap:8px;}
.scope-btn{flex:1;padding:8px 0;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;transition:all .15s;}
.scope-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.pdf-preview-wrap{border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;overflow-y:auto;flex:1;max-height:260px;background:var(--surface);}
.pdf-day-count{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.pdf-day-chip{display:inline-flex;align-items:center;gap:4px;margin:2px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--surface2);border:0.5px solid var(--border);color:var(--text-secondary);}
.pdf-day-chip.has-done{border-color:var(--green);color:var(--green);}
.pdf-modal-actions{display:flex;gap:8px;}
.pdf-cancel-btn{flex:1;padding:9px;border:0.5px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;}
.pdf-go-btn{flex:2;padding:9px;border:none;border-radius:var(--radius);background:var(--text);color:var(--bg);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.pdf-go-btn:hover{opacity:.85;}
.pdf-go-btn:disabled{opacity:.4;cursor:default;}

/* 월별 목표 모달 */
.mgoal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
.mgoal-overlay.open{display:flex;}
.mgoal-modal{background:var(--bg);border-radius:12px;width:320px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;}
.mgoal-header{display:flex;align-items:center;gap:8px;padding:1rem 1rem 0.75rem;border-bottom:0.5px solid var(--border);}
.mgoal-title{font-size:15px;font-weight:500;flex:1;}
.mgoal-scroll{flex:1;overflow-y:auto;padding:0.5rem 0;}
.mgoal-row{display:flex;align-items:center;gap:10px;padding:10px 1rem;border-bottom:0.5px solid var(--border);}
.mgoal-icon{font-size:18px;flex-shrink:0;}
.mgoal-name{flex:1;font-size:14px;}
.mgoal-input{width:60px;height:34px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;text-align:center;padding:0;flex-shrink:0;}
.mgoal-input:focus{outline:none;border-color:var(--green);}
.mgoal-unit{font-size:12px;color:var(--text-muted);flex-shrink:0;}
.mgoal-footer{padding:1rem;border-top:0.5px solid var(--border);}
/* 캘린더 헤더 목표 버튼 */
.cal-goal-btn{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:inherit;white-space:nowrap;}
.cal-goal-btn:hover{background:var(--surface);color:var(--text);}
/* 통계 목표 대비 달성 */
.count-stat-row{display:flex;align-items:center;gap:10px;padding:8px 1rem;border-bottom:0.5px solid var(--border);}
.csr-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.csr-name{flex:1;font-size:13px;}
.csr-val{font-size:13px;font-weight:500;color:var(--green);min-width:40px;text-align:right;}
.csr-target{font-size:11px;color:var(--text-muted);}
#print-area{position:fixed;left:-99999px;top:0;width:0;height:0;overflow:hidden;}
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{position:static;left:0;width:auto;height:auto;overflow:visible;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a18;}
  .p-day-page{padding:28px 32px;page-break-after:always;}
  .p-day-page:last-child{page-break-after:auto;}
  .p-header{border-bottom:2px solid #1a1a18;padding-bottom:10px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;}
  .p-date{font-size:20px;font-weight:600;}
  .p-prog{font-size:12px;color:#555;}
  .p-section-title{font-size:10px;font-weight:600;color:#999;letter-spacing:.08em;text-transform:uppercase;margin:14px 0 6px;}
  .p-routine{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #eee;}
  .p-check{width:16px;height:16px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
  .p-check.done{background:#1D9E75;border-color:#1D9E75;}
  .p-check.done::after{content:'✓';}
  .p-r-icon{font-size:14px;flex-shrink:0;}
  .p-r-body{flex:1;}
  .p-r-name{font-size:13px;}
  .p-r-memo{font-size:11px;color:#666;margin-top:2px;white-space:pre-wrap;}
  .p-gratitude{background:#f9f9f7;border-radius:6px;padding:10px;font-size:12px;line-height:1.6;color:#333;white-space:pre-wrap;margin-top:4px;}
  .p-footer{margin-top:16px;font-size:10px;color:#ccc;text-align:right;}
  .p-empty{padding:40px;text-align:center;color:#999;}
}
</style>
</head>
<body>
<div class="app">

<!-- 기본 루틴 편집 -->
<div id="view-edit" class="view">

<div id="print-area"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBsKS_5mrxUzMK3CVopeTyKmNXFFT-nRkE",
  authDomain: "my-diary-e9446.firebaseapp.com",
  projectId: "my-diary-e9446",
  storageBucket: "my-diary-e9446.firebasestorage.app",
  messagingSenderId: "291228938130",
  appId: "1:291228938130:web:13bacb3a59d24e2804db4b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const WD  =['월','화','수','목','금','토','일'];
const MO  =['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DEFAULT_ROUTINES=[
  {id:'goal',icon:'🏅',name:'목표, 실적, 감사일기'},
  {id:'exercise',icon:'🧘',name:'운동'},
  {id:'routine',icon:'💚',name:'루티니'},
  {id:'reading',icon:'📚',name:'독독'},
  {id:'market',icon:'📝',name:'시세'},
  {id:'report',icon:'🗂',name:'임보'},
];

let state={}, defaultRoutines=[], editTemp=[];
let monthGoals={}; // key: "YYYY-MM" → {routineId: target, ...}
let curYear, curMonth, curDay;
let openMemoIdx=-1;
let pdfScope='month', saveTimer=null;
let sortMode=false;
let statsScope='month', statsYear, statsMonth;

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'), txt=document.getElementById('sync-text');
  dot.className='sync-dot '+s;
  txt.textContent={ok:'동기화됨',syncing:'저장 중…',err:'오프라인 — 나중에 동기화'}[s]||'';
}

async function loadFromFirebase(){
  setSyncStatus('syncing');
  try{
    const defDoc=await getDoc(doc(db,'diary','defaults'));
    defaultRoutines=defDoc.exists()?defDoc.data().routines:JSON.parse(JSON.stringify(DEFAULT_ROUTINES));
    const snap=await getDocs(collection(db,'diary','days','entries'));
    state={};snap.forEach(d=>{state[d.id]=d.data();});
    // 월별 목표 로드
    const gsnap=await getDocs(collection(db,'diary','monthGoals','entries'));
    monthGoals={};gsnap.forEach(d=>{monthGoals[d.id]=d.data();});
    setSyncStatus('ok');
  }catch(e){
    console.error(e);
    try{state=JSON.parse(localStorage.getItem('diary_v5')||'{}');}catch(e2){state={};}
    try{const s=localStorage.getItem('diary_defaults');defaultRoutines=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}catch(e2){defaultRoutines=JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
    try{monthGoals=JSON.parse(localStorage.getItem('diary_monthGoals')||'{}');}catch(e2){monthGoals={};}
    setSyncStatus('err');
  }
  renderCalendar();
}
async function saveDayToFirebase(key,data){
  setSyncStatus('syncing');
  try{localStorage.setItem('diary_v5',JSON.stringify(state));}catch(e){}
  try{await setDoc(doc(db,'diary','days','entries',key),data);setSyncStatus('ok');}
  catch(e){console.error(e);setSyncStatus('err');}
}
async function saveDefaultsToFirebase(){
  setSyncStatus('syncing');
  try{localStorage.setItem('diary_defaults',JSON.stringify(defaultRoutines));}catch(e){}
  try{await setDoc(doc(db,'diary','defaults'),{routines:defaultRoutines});setSyncStatus('ok');}
  catch(e){console.error(e);setSyncStatus('err');}
}
function scheduleSave(key,data){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveDayToFirebase(key,data),800);
}

function monthGoalKey(y,m){return `${y}-${String(m+1).padStart(2,'0')}`;}
function getMonthTarget(routineId, y, m){
  const mk=monthGoalKey(y,m);
  // 월별 목표 있으면 사용, 없으면 기본 루틴의 target 사용
  if(monthGoals[mk]&&monthGoals[mk][routineId]!=null) return monthGoals[mk][routineId];
  const def=defaultRoutines.find(r=>r.id===routineId);
  return def?(def.target||1):1;
}
async function saveMGoalToFirebase(mk, data){
  setSyncStatus('syncing');
  try{localStorage.setItem('diary_monthGoals',JSON.stringify(monthGoals));}catch(e){}
  try{await setDoc(doc(db,'diary','monthGoals','entries',mk),data);setSyncStatus('ok');}
  catch(e){console.error(e);setSyncStatus('err');}
}

// 월별 목표 모달
function openMGoalModal(){
  const mk=monthGoalKey(curYear,curMonth);
  document.getElementById('mgoal-title').textContent=`${String(curYear).slice(2)}년 ${MO[curMonth]} 카운트 목표`;
  const countRoutines=defaultRoutines.filter(r=>r.countMode);
  const list=document.getElementById('mgoal-list');list.innerHTML='';
  if(!countRoutines.length){
    list.innerHTML='<div style="padding:2rem 1rem;text-align:center;font-size:13px;color:var(--text-muted);">카운트 루틴이 없어요.<br>기본 루틴 관리에서 횟수 카운트를 켜주세요.</div>';
  }else{
    countRoutines.forEach(r=>{
      const cur=getMonthTarget(r.id,curYear,curMonth);
      const row=document.createElement('div');row.className='mgoal-row';
      row.innerHTML=`<span class="mgoal-icon">${r.icon}</span><span class="mgoal-name">${r.name}</span>
        <input class="mgoal-input" type="number" min="0" max="9999" value="${cur}" data-rid="${r.id}" />
        <span class="mgoal-unit">회</span>`;
      list.appendChild(row);
    });
  }
  document.getElementById('mgoal-overlay').classList.add('open');
}
window.openMGoalModal=openMGoalModal;
function closeMGoalModal(){document.getElementById('mgoal-overlay').classList.remove('open');}
window.closeMGoalModal=closeMGoalModal;
async function saveMGoal(){
  const mk=monthGoalKey(curYear,curMonth);
  if(!monthGoals[mk])monthGoals[mk]={};
  document.querySelectorAll('.mgoal-input').forEach(inp=>{
    const rid=inp.dataset.rid;
    monthGoals[mk][rid]=Math.max(0,parseInt(inp.value)||0);
  });
  await saveMGoalToFirebase(mk,monthGoals[mk]);
  closeMGoalModal();
  renderCalendar();
}
window.saveMGoal=saveMGoal;

function dayKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getDay(y,m,d){
  const k=dayKey(y,m,d);
  if(!state[k]){
    state[k]={
      routines:defaultRoutines.map(r=>({
        ...r,done:false,memo:'',
        countMode:r.countMode||false,
        count:0,
        target:getMonthTarget(r.id,y,m)
      })),
      gratitude:''
    };
  }
  // 월별 목표 항상 최신값 반영
  if(state[k].routines){
    state[k].routines.forEach(r=>{
      if(r.countMode) r.target=getMonthTarget(r.id,y,m);
    });
  }
  return state[k];
}

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='cal'){sortMode=false;renderCalendar();}
  if(v==='stats')renderStats();
  if(v==='edit')renderEditView();
}
window.showView=showView;
function changeMonth(d){curMonth+=d;if(curMonth<0){curYear--;curMonth=11;}if(curMonth>11){curYear++;curMonth=0;}renderCalendar();}
window.changeMonth=changeMonth;

function renderCalendar(){
  document.getElementById('cal-title').textContent=`${String(curYear).slice(2)}년 ${MO[curMonth]}`;
  const first=defaultRoutines[0];
  const leg=document.getElementById('cal-legend');
  if(first)leg.innerHTML=`<span style="font-size:11px;color:var(--text-muted)">${first.name.length>6?first.name.slice(0,6)+'…':first.name}</span>`;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const today=new Date();
  let sd=new Date(curYear,curMonth,1).getDay();sd=sd===0?6:sd-1;
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<sd;i++){const el=document.createElement('div');el.className='cal-day empty';el.innerHTML='<span class="dn"></span>';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');el.className='cal-day';
    if(today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d)el.classList.add('today');
    const dd=state[dayKey(curYear,curMonth,d)];
    let inner='';
    if(dd&&dd.routines&&dd.routines.length>0){
      const fr=dd.routines[0];
      const memo=fr.memo&&fr.memo.trim()?fr.memo.trim():'';
      const done=fr.done||(fr.countMode&&(fr.count||0)>=1);
      if(memo){
        inner+=`<span class="day-memo-text">${memo}</span>`;
      } else {
        inner+=done?`<span class="day-done-dot"></span>`:'';
      }
    }
    el.innerHTML=`<span class="dn">${d}</span>${inner}`;
    el.onclick=()=>openDay(d);
    grid.appendChild(el);
  }
}

function openDay(d){
  curDay=d;openMemoIdx=-1;sortMode=false;
  const o=new Date(curYear,curMonth,d);
  const dow=WD[o.getDay()===0?6:o.getDay()-1];
  document.getElementById('daily-date-label').textContent=`${String(curYear).slice(2)}년 ${curMonth+1}월 ${d}일 (${dow})`;
  const dd=getDay(curYear,curMonth,d);
  document.getElementById('gratitude-text').value=dd.gratitude||'';
  closeCustomInput();renderDailyRoutines();renderPresets();showView('daily');
}
window.openDay=openDay;

function toggleSortMode(){
  sortMode=!sortMode;
  document.getElementById('sort-toggle-btn').classList.toggle('active',sortMode);
  openMemoIdx=-1;
  renderDailyRoutines();
}
window.toggleSortMode=toggleSortMode;

function moveDailyRoutine(i,dir){
  const dd=getDay(curYear,curMonth,curDay);
  const j=i+dir;if(j<0||j>=dd.routines.length)return;
  [dd.routines[i],dd.routines[j]]=[dd.routines[j],dd.routines[i]];
  scheduleSave(dayKey(curYear,curMonth,curDay),dd);
  renderDailyRoutines();
}
window.moveDailyRoutine=moveDailyRoutine;

function renderDailyRoutines(){
  const dd=getDay(curYear,curMonth,curDay);
  const list=document.getElementById('routines-list');list.innerHTML='';
  const countIds=new Set(defaultRoutines.filter(r=>r.countMode).map(r=>r.id));
  dd.routines.forEach((r,i)=>{
    const isCount=r.countMode||countIds.has(r.id);
    const tgt=getMonthTarget(r.id,curYear,curMonth);
    const cnt=r.count||0;
    // 체크 여부: 카운트 루틴은 count>=1, 일반은 done
    const checked=isCount?(cnt>=1):r.done;
    const wrap=document.createElement('div');wrap.className='r-item'+(sortMode?' sort-mode':'');
    const hasMemo=!!(r.memo&&r.memo.trim()),isEditOpen=(openMemoIdx===i&&!sortMode);
    const top=document.createElement('div');top.className='r-item-top';
    if(sortMode){
      top.innerHTML=`
        <div class="sort-handle">
          <button class="sort-up" onclick="moveDailyRoutine(${i},-1)" ${i===0?'disabled':''} aria-label="위로"><i class="ti ti-chevron-up"></i></button>
          <button class="sort-down" onclick="moveDailyRoutine(${i},1)" ${i===dd.routines.length-1?'disabled':''} aria-label="아래로"><i class="ti ti-chevron-down"></i></button>
        </div>
        <span class="r-icon" style="cursor:default">${r.icon}</span>
        <span class="r-name" style="cursor:default;color:var(--text-secondary)">${r.name}</span>
        <span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">${i+1}순위</span>`;
    } else {
      // 카운트 루틴: 체크 + 카운트 숫자 표시
      const countBadge=isCount
        ?`<span style="font-size:11px;color:${cnt>=tgt?'var(--green)':'var(--text-muted)'};min-width:32px;text-align:right;flex-shrink:0;">${cnt}/${tgt}</span>`
        :'';
      top.innerHTML=`
        <span class="r-icon">${r.icon}</span>
        <span class="r-name">${r.name}</span>
        <div class="r-actions">
          ${countBadge}
          <button class="memo-btn ${hasMemo||isEditOpen?'has-memo':''}" aria-label="메모"><i class="ti ti-pencil"></i></button>
          <button class="del-r-btn" aria-label="삭제"><i class="ti ti-x"></i></button>
          <div class="check-circle ${checked?'done':''}">${checked?'<i class="ti ti-check" style="font-size:12px"></i>':''}</div>
        </div>`;
      top.querySelector('.check-circle').onclick=()=>toggleDone(i);
      top.querySelector('.r-name').onclick=()=>toggleDone(i);
      top.querySelector('.r-icon').onclick=()=>toggleDone(i);
      top.querySelector('.memo-btn').onclick=(e)=>{e.stopPropagation();toggleMemoEdit(i);};
      top.querySelector('.del-r-btn').onclick=(e)=>{e.stopPropagation();deleteRoutine(i);};
    }
    wrap.appendChild(top);
    if(!sortMode){
      if(hasMemo&&!isEditOpen){const disp=document.createElement('div');disp.className='r-memo-display';disp.textContent=r.memo;wrap.appendChild(disp);}
      const editWrap=document.createElement('div');editWrap.className='r-memo-edit'+(isEditOpen?' open':'');
      const ta=document.createElement('textarea');ta.className='r-memo-ta';ta.placeholder='세부 내용을 입력하세요…';ta.value=r.memo||'';ta.rows=3;
      const btnRow=document.createElement('div');btnRow.className='memo-save-row';
      const cb=document.createElement('button');cb.className='memo-cancel-btn';cb.textContent='취소';cb.onclick=()=>{openMemoIdx=-1;renderDailyRoutines();};
      const ob=document.createElement('button');ob.className='memo-ok-btn';ob.textContent='저장';
      ob.onclick=()=>{dd.routines[i].memo=ta.value.trim();openMemoIdx=-1;scheduleSave(dayKey(curYear,curMonth,curDay),dd);renderDailyRoutines();};
      btnRow.appendChild(cb);btnRow.appendChild(ob);editWrap.appendChild(ta);editWrap.appendChild(btnRow);wrap.appendChild(editWrap);
      if(isEditOpen)requestAnimationFrame(()=>ta.focus());
    }
    list.appendChild(wrap);
  });
  updateProgress();
}
function toggleMemoEdit(i){openMemoIdx=(openMemoIdx===i)?-1:i;renderDailyRoutines();}
function toggleDone(i){
  const dd=getDay(curYear,curMonth,curDay);
  const r=dd.routines[i];
  const countIds=new Set(defaultRoutines.filter(r=>r.countMode).map(r=>r.id));
  const isCount=r.countMode||countIds.has(r.id);
  if(isCount){
    // 카운트 루틴: 체크 = count+1, 이미 1이상이면 0으로 리셋
    r.count=(r.count||0)>=1?0:(r.count||0)+1;
    r.done=r.count>=1;
  } else {
    r.done=!r.done;
  }
  scheduleSave(dayKey(curYear,curMonth,curDay),dd);renderDailyRoutines();
}
function deleteRoutine(i){const dd=getDay(curYear,curMonth,curDay);dd.routines.splice(i,1);if(openMemoIdx===i)openMemoIdx=-1;scheduleSave(dayKey(curYear,curMonth,curDay),dd);renderDailyRoutines();renderPresets();}
function updateProgress(){
  const dd=getDay(curYear,curMonth,curDay);
  const countIds=new Set(defaultRoutines.filter(r=>r.countMode).map(r=>r.id));
  const total=dd.routines.length;
  const done=dd.routines.filter(r=>{
    const isCount=r.countMode||countIds.has(r.id);
    return isCount?(r.count||0)>=1:r.done;
  }).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog-count').textContent=`달성 ${done}/${total}`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=pct+'%';
}
function renderPresets(){
  const dd=getDay(curYear,curMonth,curDay);
  const existIds=new Set(dd.routines.map(r=>r.id));
  const ps=document.getElementById('preset-scroll');ps.innerHTML='';
  defaultRoutines.filter(r=>!existIds.has(r.id)).forEach(r=>{
    const chip=document.createElement('div');chip.className='preset-chip';
    chip.innerHTML=`<span>${r.icon}</span><span>${r.name}</span>`;
    chip.onclick=()=>{dd.routines.push({...r,done:false,memo:'',count:0});scheduleSave(dayKey(curYear,curMonth,curDay),dd);renderDailyRoutines();renderPresets();};
    ps.appendChild(chip);
  });
  if(!ps.children.length)ps.innerHTML=`<span style="font-size:12px;color:var(--text-muted)">추가할 기본 루틴이 없어요</span>`;
}

function toggleCustomInput(){

  if(row.classList.contains('open')){closeCustomInput();}
  else{row.classList.add('open');document.getElementById('ci-icon-input').focus();}
}
window.toggleCustomInput=toggleCustomInput;
function closeCustomInput(){
  document.getElementById('custom-input-row').classList.remove('open');
  document.getElementById('ci-name').value='';
  document.getElementById('ci-icon-input').value='';
}
function addCustomRoutine(){

window.addCustomRoutine=addCustomRoutine;

function saveDay(){

  saveDayToFirebase(dayKey(curYear,curMonth,curDay),dd);showView('cal');

window.saveDay=saveDay;

/* ── 통계 ── */
function setStatsScope(s){statsScope=s;document.getElementById('scope-btn-month').classList.toggle('active',s==='month');document.getElementById('scope-btn-year').classList.toggle('active',s==='year');renderStats();}
window.setStatsScope=setStatsScope;
function statsPrev(){if(statsScope==='month'){statsMonth--;if(statsMonth<0){statsYear--;statsMonth=11;}}else{statsYear--;}renderStats();}
function statsNext(){if(statsScope==='month'){statsMonth++;if(statsMonth>11){statsYear++;statsMonth=0;}}else{statsYear++;}renderStats();}
window.statsPrev=statsPrev;window.statsNext=statsNext;

function renderStats(){if(statsScope==='month')renderMonthStats();else renderYearStats();}

function renderMonthStats(){
  document.getElementById('stats-period-label').textContent=`${statsYear}년 ${MO[statsMonth]}`;
  const days=new Date(statsYear,statsMonth+1,0).getDate();
  let activeDays=0,totalDone=0,totalR=0,maxStreak=0,cur=0;
  const cnt={};
  const countTotals={};
  const countIds=new Set(defaultRoutines.filter(r=>r.countMode).map(r=>r.id));

  for(let d=1;d<=days;d++){
    const dd=state[dayKey(statsYear,statsMonth,d)];
    if(!dd||!dd.routines||!dd.routines.length)continue;
    activeDays++;
    const done=dd.routines.filter(r=>{
      const isCount=r.countMode||countIds.has(r.id);
      if(isCount){
        // 체크됐으면 카운트 1로 인정, 아니면 count 값 사용
        const effective=r.done?Math.max(r.count||0,1):(r.count||0);
        const tgt=getMonthTarget(r.id,statsYear,statsMonth);
        return effective>=tgt;
      }
      return r.done;
    }).length;
    totalDone+=done;totalR+=dd.routines.length;

    dd.routines.forEach(r=>{
      const isCount=r.countMode||countIds.has(r.id);
      if(isCount){
        if(!countTotals[r.id])countTotals[r.id]={name:r.name,icon:r.icon,count:0,target:getMonthTarget(r.id,statsYear,statsMonth)};
        // 체크됐으면 카운트 최소 1로 인정
        const effective=r.done?Math.max(r.count||0,1):(r.count||0);
        countTotals[r.id].count+=effective;
      } else {
        if(!cnt[r.name])cnt[r.name]={icon:r.icon,done:0,total:0};
        cnt[r.name].total++;if(r.done)cnt[r.name].done++;
      }
    });
    if(done>0){cur++;maxStreak=Math.max(maxStreak,cur);}else cur=0;
  }
  const pct=totalR>0?Math.round(totalDone/totalR*100):0;
  document.getElementById('stats-cards').innerHTML=`
    <div class="sc"><div class="sl">달성률</div><div class="sv" style="color:var(--green)">${pct}%</div><div class="ss">기록일 기준</div></div>
    <div class="sc"><div class="sl">기록한 날</div><div class="sv">${activeDays}일</div><div class="ss">총 ${days}일 중</div></div>
    <div class="sc"><div class="sl">최장 연속</div><div class="sv">${maxStreak}일</div><div class="ss">루틴 완료 기준</div></div>
    <div class="sc"><div class="sl">총 완료</div><div class="sv">${totalDone}건</div><div class="ss">전체 루틴 체크</div></div>`;
  const body=document.getElementById('stats-body');body.innerHTML='';

  if(Object.keys(countTotals).length){
    const ct=document.createElement('div');ct.className='rst-section-title';ct.textContent='카운트 루틴 — 월 누적 달성';body.appendChild(ct);
    Object.values(countTotals).forEach(v=>{
      const tgt=v.target;const p=tgt>0?Math.min(100,Math.round(v.count/tgt*100)):0;
      const reached=v.count>=tgt;
      const row=document.createElement('div');row.className='count-stat-row';
      row.innerHTML=`<span class="csr-icon">${v.icon}</span>
        <span class="csr-name">${v.name}</span>
        <div class="rb-w" style="width:80px"><div class="rb" style="width:${p}%;background:${reached?'var(--accent)':'var(--green)'}"></div></div>
        <span class="csr-val" style="color:${reached?'var(--green)':'var(--text)'}">${v.count}<span class="csr-target"> / ${tgt}</span></span>`;
      body.appendChild(row);
    });
  }

  if(Object.keys(cnt).length){
    const title=document.createElement('div');title.className='rst-section-title';
    title.style.marginTop=Object.keys(countTotals).length?'8px':'0';
    title.textContent='루틴별 달성 현황';body.appendChild(title);
    Object.entries(cnt).sort((a,b)=>b[1].done-a[1].done).forEach(([name,v])=>{
      const p=v.total>0?Math.round(v.done/v.total*100):0;
      const row=document.createElement('div');row.className='rst-row';
      row.innerHTML=`<span class="ri">${v.icon}</span><span class="rn">${name}</span><div class="rb-w"><div class="rb" style="width:${p}%"></div></div><span class="rp">${p}%</span>`;
      body.appendChild(row);
    });
  }
}
function renderYearStats(){
  document.getElementById('stats-period-label').textContent=`${statsYear}년`;
  let yearActive=0,yearDone=0,yearTotal=0,yearStreak=0,curStreak=0;
  const monthData=[];const routineCnt={};
  for(let m=0;m<12;m++){
    const days=new Date(statsYear,m+1,0).getDate();
    let mActive=0,mDone=0,mTotal=0;
    for(let d=1;d<=days;d++){
      const dd=state[dayKey(statsYear,m,d)];
      if(!dd||!dd.routines||!dd.routines.length)continue;
      mActive++;
      const done=dd.routines.filter(r=>r.done).length;
      mDone+=done;mTotal+=dd.routines.length;
      dd.routines.forEach(r=>{if(!routineCnt[r.name])routineCnt[r.name]={icon:r.icon,done:0,total:0};routineCnt[r.name].total++;if(r.done)routineCnt[r.name].done++;});
      if(done>0){curStreak++;yearStreak=Math.max(yearStreak,curStreak);}else curStreak=0;
    }
    yearActive+=mActive;yearDone+=mDone;yearTotal+=mTotal;
    monthData.push({pct:mTotal>0?Math.round(mDone/mTotal*100):0,active:mActive});
  }
  const yearPct=yearTotal>0?Math.round(yearDone/yearTotal*100):0;
  document.getElementById('stats-cards').innerHTML=`
    <div class="sc"><div class="sl">연간 달성률</div><div class="sv" style="color:var(--green)">${yearPct}%</div><div class="ss">기록일 기준</div></div>
    <div class="sc"><div class="sl">기록한 날</div><div class="sv">${yearActive}일</div><div class="ss">${statsYear}년 전체</div></div>
    <div class="sc"><div class="sl">최장 연속</div><div class="sv">${yearStreak}일</div><div class="ss">루틴 완료 기준</div></div>
    <div class="sc"><div class="sl">총 완료</div><div class="sv">${yearDone}건</div><div class="ss">전체 루틴 체크</div></div>`;
  const body=document.getElementById('stats-body');body.innerHTML='';
  const barTitle=document.createElement('div');barTitle.className='rst-section-title';barTitle.textContent='월별 달성률';body.appendChild(barTitle);
  const bars=document.createElement('div');bars.className='month-bars';
  monthData.forEach((m,idx)=>{
    const row=document.createElement('div');row.className='mb-row';
    row.innerHTML=`<span class="mb-label">${idx+1}월</span><div class="mb-bar-wrap"><div class="mb-bar" style="width:${m.pct}%"></div></div><span class="mb-pct">${m.active>0?m.pct+'%':'-'}</span>`;
    bars.appendChild(row);
  });
  body.appendChild(bars);
  if(Object.keys(routineCnt).length){
    const rtitle=document.createElement('div');rtitle.className='rst-section-title';rtitle.style.marginTop='8px';rtitle.textContent='루틴별 달성 현황';body.appendChild(rtitle);
    Object.entries(routineCnt).sort((a,b)=>b[1].done-a[1].done).forEach(([name,v])=>{
      const p=v.total>0?Math.round(v.done/v.total*100):0;
      const row=document.createElement('div');row.className='rst-row';
      row.innerHTML=`<span class="ri">${v.icon}</span><span class="rn">${name}</span><div class="rb-w"><div class="rb" style="width:${p}%"></div></div><span class="rp">${p}%</span>`;
      body.appendChild(row);
    });
  }
}

/* ── 기본 루틴 편집 ── */
function renderEditView(){editTemp=JSON.parse(JSON.stringify(defaultRoutines));renderEditList();}
function renderEditList(){
  const list=document.getElementById('edit-list');list.innerHTML='';
  editTemp.forEach((r,i)=>{
    const isFirst=i===0;const row=document.createElement('div');row.className='edit-row';
    row.style.flexWrap='wrap';row.style.rowGap='4px';
    const isCount=!!r.countMode;
    row.innerHTML=`<div class="order-btns">
        <button class="ob" onclick="moveR(${i},-1)" ${i===0?'disabled':''} aria-label="위로"><i class="ti ti-chevron-up"></i></button>
        <button class="ob" onclick="moveR(${i},1)" ${i===editTemp.length-1?'disabled':''} aria-label="아래로"><i class="ti ti-chevron-down"></i></button>
      </div>
      <input class="e-icon-input" value="${r.icon||'⭐'}" maxlength="2" data-i="${i}" aria-label="아이콘" ${isFirst?'style="border-color:var(--green)"':''}/>
      <input class="e-name-input" value="${r.name.replace(/"/g,'&quot;')}" data-i="${i}" placeholder="루틴 이름" ${isFirst?'style="font-weight:500"':''}/>
      ${isFirst?'<span class="one-badge">원씽</span>':''}
      <button class="del-btn" onclick="delEditR(${i})" aria-label="삭제"><i class="ti ti-trash"></i></button>
      <div style="width:100%;display:flex;align-items:center;gap:8px;padding-left:64px;">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--text-secondary);">
          <input type="checkbox" ${isCount?'checked':''} data-ci="${i}" style="accent-color:var(--green);width:14px;height:14px;" /> 횟수 카운트 (월목표에서 목표 설정)
        </label>
      </div>`;
    row.querySelector('.e-name-input').addEventListener('input',function(){editTemp[parseInt(this.dataset.i)].name=this.value;});
    row.querySelector('.e-icon-input').addEventListener('input',function(){editTemp[parseInt(this.dataset.i)].icon=this.value||'⭐';});
    row.querySelector('input[type="checkbox"]').addEventListener('change',function(){
      const idx=parseInt(this.dataset.ci);editTemp[idx].countMode=this.checked;renderEditList();
    });
    list.appendChild(row);
  });
}
function moveR(i,d){const j=i+d;if(j<0||j>=editTemp.length)return;[editTemp[i],editTemp[j]]=[editTemp[j],editTemp[i]];renderEditList();}
window.moveR=moveR;
function delEditR(i){editTemp.splice(i,1);renderEditList();}
window.delEditR=delEditR;
function addDefaultRoutine(){editTemp.push({id:'d'+Date.now(),icon:'⭐',name:''});renderEditList();document.querySelectorAll('.e-name-input')[editTemp.length-1]?.focus();}
window.addDefaultRoutine=addDefaultRoutine;
async function saveDefaults(){
  const valid=editTemp.filter(r=>r.name.trim()).map(r=>({...r,icon:r.icon||'⭐',countMode:!!r.countMode,target:r.target||1}));
  if(!valid.length){alert('루틴이 최소 1개 필요해요.');return;}
  defaultRoutines=valid;await saveDefaultsToFirebase();showView('cal');
}
window.saveDefaults=saveDefaults;

/* ── PDF ── */
function getRecordedDays(scope){
  const allKeys=Object.keys(state).filter(k=>state[k]&&state[k].routines&&state[k].routines.length>0);
  if(scope==='month'){const prefix=`${curYear}-${String(curMonth+1).padStart(2,'0')}-`;return allKeys.filter(k=>k.startsWith(prefix)).sort();}
  return allKeys.sort();
}
function keyToLabel(k){const [y,m,d]=k.split('-').map(Number);const o=new Date(y,m-1,d);const dow=WD[o.getDay()===0?6:o.getDay()-1];return `${String(y).slice(2)}년 ${m}월 ${d}일 (${dow})`;}

function openPdfModal(mode){
  if(mode==='day'){
    document.getElementById('pdf-modal-title').textContent='오늘 일자 PDF';
    document.getElementById('pdf-modal-sub').textContent='현재 날짜 기록을 PDF로 저장해요';
    document.getElementById('pdf-scope-row').style.display='none';
    const k=dayKey(curYear,curMonth,curDay);
    const dd=state[k];const total=dd?dd.routines.length:0,done=dd?dd.routines.filter(r=>r.done).length:0;
    document.getElementById('pdf-day-count').textContent=`달성 ${done}/${total}`;
    document.getElementById('pdf-day-list').innerHTML=`<div class="pdf-day-chip has-done">${keyToLabel(k)}</div>`;
    buildPrintArea([k]);
    document.getElementById('pdf-go-btn').disabled=false;
  }else{
    pdfScope='month';
    document.getElementById('pdf-modal-title').textContent='전체 기록 PDF';
    document.getElementById('pdf-modal-sub').textContent='기록이 있는 날짜를 한 번에 저장해요';
    document.getElementById('pdf-scope-row').style.display='flex';
    document.getElementById('scope-month').classList.add('active');
    document.getElementById('scope-all').classList.remove('active');
    updatePdfPreview();
  }
  document.getElementById('pdf-overlay').classList.add('open');
}
window.openPdfModal=openPdfModal;
function setPdfScope(s){pdfScope=s;document.getElementById('scope-month').classList.toggle('active',s==='month');document.getElementById('scope-all').classList.toggle('active',s==='all');updatePdfPreview();}
window.setPdfScope=setPdfScope;

function updatePdfPreview(){
  const keys=getRecordedDays(pdfScope);const btn=document.getElementById('pdf-go-btn');
  if(!keys.length){document.getElementById('pdf-day-count').textContent='기록된 날짜가 없어요';document.getElementById('pdf-day-list').innerHTML='';btn.disabled=true;buildPrintArea([]);return;}
  btn.disabled=false;
  document.getElementById('pdf-day-count').textContent=`총 ${keys.length}일 · 날짜별 1페이지씩 저장돼요`;
  const listEl=document.getElementById('pdf-day-list');listEl.innerHTML='';
  keys.forEach(k=>{const dd=state[k];const done=dd.routines.filter(r=>r.done).length;const chip=document.createElement('div');chip.className='pdf-day-chip'+(done>0?' has-done':'');chip.textContent=keyToLabel(k)+` · ${done}/${dd.routines.length}`;listEl.appendChild(chip);});
  buildPrintArea(keys);
}

// 핵심 수정: 프린트 영역을 항상 명시적으로 새로 채움 (빈 배열도 처리)
function buildPrintArea(keys){
  const target=document.getElementById('print-area');
  if(!keys||!keys.length){
    target.innerHTML='<div class="p-day-page"><div class="p-empty">저장할 기록이 없어요</div></div>';
    return;
  }
  let html='';
  keys.forEach(k=>{
    const dd=state[k];
    if(!dd||!dd.routines)return;
    const label=keyToLabel(k);
    const total=dd.routines.length,done=dd.routines.filter(r=>r.done).length;
    const pct=total>0?Math.round(done/total*100):0;
    html+=`<div class="p-day-page">
      <div class="p-header"><div class="p-date">${label}</div><div class="p-prog">달성 ${done}/${total} · ${pct}%</div></div>
      <div class="p-section-title">루틴 체크리스트</div>`;
    dd.routines.forEach(r=>{
      html+=`<div class="p-routine">
        <div class="p-check ${r.done?'done':''}"></div>
        <div class="p-r-icon">${r.icon||''}</div>
        <div class="p-r-body"><div class="p-r-name">${r.name||''}</div>${r.memo?`<div class="p-r-memo">${escapeHtml(r.memo)}</div>`:''}</div>
      </div>`;
    });
    if(dd.gratitude&&dd.gratitude.trim()){
      html+=`<div class="p-section-title">🙏 감사일기</div><div class="p-gratitude">${escapeHtml(dd.gratitude)}</div>`;
    }
    html+=`<div class="p-footer">루틴 다이어리 · ${label}</div></div>`;
  });
  target.innerHTML=html;
}
function escapeHtml(s){
  const div=document.createElement('div');div.textContent=s;return div.innerHTML;
}

function closePdfModal(){document.getElementById('pdf-overlay').classList.remove('open');}
window.closePdfModal=closePdfModal;

function doPrint(){
  closePdfModal();
  // 프린트 영역이 DOM에 완전히 반영된 뒤 인쇄 — rAF 두 번으로 레이아웃 확정 보장
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.print();
    });
  });
}
window.doPrint=doPrint;

statsYear=now.getFullYear();statsMonth=now.getMonth();
