<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>루틴 다이어리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
/* 기존 스타일을 기반으로 개선된 통합 스타일 */
:root{--bg:#ffffff;--surface:#f7f7f5;--green:#1D9E75;--text:#1a1a18;--border:rgba(0,0,0,0.1);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0;}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.view{display:none;flex-direction:column;flex:1;}
.view.active{display:flex;}

/* [추가] 통계 네비게이션 */
.stats-nav{display:flex;gap:10px;padding:1rem;border-bottom:0.5px solid var(--border);}
.stats-scope-btn{padding:6px 16px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;}
.stats-scope-btn.active{background:var(--text);color:var(--bg);}

/* [추가] 감사일기 창 확대 */
.g-textarea{width:100%;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);padding:12px;min-height:180px;resize:none;}

/* [유지] 기존 루틴 순서 변경 버튼 */
.order-btns{display:flex;flex-direction:column;margin-right:10px;}
.ob{width:24px;height:22px;border:0.5px solid var(--border);background:transparent;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <div id="view-cal" class="view active">...</div>

  <div id="view-daily" class="view">
    <div id="routines-list"></div>
    <textarea class="g-textarea" id="gratitude-text"></textarea>
  </div>

  <div id="view-stats" class="view">
    <div class="stats-nav">
      <button class="stats-scope-btn active" id="btn-month" onclick="setStatsScope('month')">월별</button>
      <button class="stats-scope-btn" id="btn-year" onclick="setStatsScope('year')">연도별</button>
    </div>
    <div id="stats-content"></div>
  </div>
</div>

<script>
// 기존 Firebase 설정 및 로직은 그대로 유지
const docRef = db.collection("diary_app").doc("my_records");

// [기존] 루틴 순서 변경 로직 (살아있음)
function moveR(i, d){
  const dd = getDay(curYear, curMonth, curDay);
  const j = i + d;
  if(j < 0 || j >= dd.routines.length) return;
  [dd.routines[i], dd.routines[j]] = [dd.routines[j], dd.routines[i]];
  saveState();
  renderDailyRoutines();
}

// [신규] 통계 범위 전환 로직
let statsScope = 'month';
function setStatsScope(scope) {
  statsScope = scope;
  document.getElementById('btn-month').classList.toggle('active', scope === 'month');
  document.getElementById('btn-year').classList.toggle('active', scope === 'year');
  renderStats();
}

function renderStats() {
  // 기존 통계 계산 로직을 여기에 통합하여 
  // statsScope에 따라 데이터를 분류하도록 구성하면 됩니다.
  const content = document.getElementById('stats-content');
  content.innerHTML = `<div>현재 ${statsScope} 통계 모드입니다.</div>`;
}

// 나머지 렌더링 함수들...
</script>
</body>
</html>
